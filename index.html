<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Calsindo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calsindo">
    <link rel="apple-touch-icon" href="calsindo.jpeg">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden-view { display: none !important; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

    <!-- AUTH VIEW -->
    <div id="authView" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <div class="text-center mb-8">
                <img src="calsindo.jpeg" class="h-20 mx-auto mb-4" alt="Logo">
                <h2 class="text-2xl font-bold">Aplikasi Demplot Calsindo</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" class="w-full border rounded-xl p-4 text-sm">
                <input type="password" id="authPass" placeholder="Password" class="w-full border rounded-xl p-4 text-sm">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">LOGIN</button>
            </div>
        </div>
    </div>

    <!-- APP VIEW -->
    <div id="appView" class="hidden-view">
        <header class="bg-white border-b px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="font-bold">Monitoring Calsindo</h1>
                <p id="userNameDisplay" class="text-xs text-blue-600">User: Petugas</p>
            </div>
            <button onclick="handleLogout()"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-5">
            <button onclick="detectGPS()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-3">
                <i class="fas fa-location-crosshairs"></i> DETEKSI LOKASI & ID OTOMATIS
            </button>

            <!-- Form Data -->
            <div class="bg-white p-5 rounded-2xl shadow space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400">ID Demplot</label>
                    <input type="text" id="idDemplot" readonly class="w-full border rounded-xl p-3 font-mono font-bold">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400">Nama Pemilik</label>
                    <input type="text" id="namaPemilik" class="w-full border rounded-xl p-3">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-400">Telepon</label>
                        <input type="tel" id="telepon" class="w-full border rounded-xl p-3">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400">Luasan (Ha)</label>
                        <input type="number" step="0.01" id="luasan" class="w-full border rounded-xl p-3">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400">Lokasi GPS</label>
                    <input type="text" id="lokasiGPS" readonly class="w-full border rounded-xl p-3 text-blue-600 text-sm">
                </div>
            </div>

            <!-- FOTO -->
            <div class="bg-white p-5 rounded-2xl shadow">
                <label class="block text-xs font-bold text-gray-400 mb-2">Foto Dokumentasi (Maks 4)</label>
                <div id="photoGrid" class="grid grid-cols-4 gap-2"></div>
            </div>

            <!-- Tanggal & Keterangan -->
            <div class="bg-white p-5 rounded-2xl shadow space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400">Tanggal Tanam</label>
                    <input type="date" id="tglTanam" class="w-full border rounded-xl p-3">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs font-bold text-gray-400">P1</label><input type="date" id="p1" class="w-full border rounded p-2"></div>
                    <div><label class="text-xs font-bold text-gray-400">P2</label><input type="date" id="p2" class="w-full border rounded p-2"></div>
                    <div><label class="text-xs font-bold text-gray-400">P3</label><input type="date" id="p3" class="w-full border rounded p-2"></div>
                    <div><label class="text-xs font-bold text-gray-400">P4</label><input type="date" id="p4" class="w-full border rounded p-2"></div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400">Keterangan</label>
                    <textarea id="keterangan" rows="3" class="w-full border rounded-xl p-3"></textarea>
                </div>
            </div>

            <button onclick="submitData()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-3xl">SIMPAN DATA KE CLOUD</button>
        </main>
    </div>

    <!-- LOADING -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-[100]">
        <div class="loader w-14 h-14 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin"></div>
    </div>

    <!-- MODAL UPDATE -->
    <div id="locationChoiceModal" class="fixed inset-0 bg-black/70 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6">
            <h3 class="font-bold text-xl mb-4">Lokasi Sudah Ada</h3>
            <div id="nearbyList" class="space-y-2 mb-4 max-h-64 overflow-auto"></div>
            <button onclick="chooseCreateNew()" class="w-full bg-gray-200 py-3 rounded-2xl font-bold">Buat Lokasi Baru</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://adlsyyualatelwwkftyf.supabase.co";
        const SB_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbHN5eXVhbGF0ZWx3d2tmdHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDY3MzcsImV4cCI6MjA4NjU4MjczN30.QG7BL1d5OORWX6U6TGvz5-1IgjjsT8xexGUwwKM8AH4";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyIfannGC5N-oykQAiRXfL4d62txBsxM1upcao6qkuuBFV9l9AyoRnBYsnAcwCj8TFfmA/exec";

        const supabaseClient = supabase.createClient(SB_URL, SB_ANON_KEY);
        let activeUser = null;
        let currentNearbyRecords = [];
        let existingPhotoUrls = [];
        let isUpdateMode = false;

        window.onload = async () => {
            initPhotoGrid();
            checkSession();
            await loadProvinces();
        };

        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                activeUser = user;
                document.getElementById('appView').classList.remove('hidden-view');
                document.getElementById('authView').classList.add('hidden-view');
                document.getElementById('userNameDisplay').innerText = "User: " + user.email;
            } else {
                document.getElementById('authView').classList.remove('hidden-view');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message);
            else checkSession();
        }

        function initPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-gray-100 rounded-xl border flex items-center justify-center cursor-pointer relative overflow-hidden';
                div.innerHTML = `
                    <input type="file" accept="image/*" capture="environment" hidden class="photoInput">
                    <img class="absolute inset-0 w-full h-full object-cover hidden photoPreview">
                    <i class="fas fa-camera text-3xl text-gray-300"></i>
                    <button class="absolute top-1 right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full hidden delete-btn">×</button>
                `;
                const input = div.querySelector('.photoInput');
                const preview = div.querySelector('.photoPreview');
                const icon = div.querySelector('i');
                const delBtn = div.querySelector('.delete-btn');

                div.onclick = () => input.click();
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (re) => {
                            preview.src = re.target.result;
                            preview.classList.remove('hidden');
                            icon.classList.add('hidden');
                            delBtn.classList.remove('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                delBtn.onclick = (e) => {
                    e.stopImmediatePropagation();
                    preview.src = '';
                    preview.classList.add('hidden');
                    icon.classList.remove('hidden');
                    delBtn.classList.add('hidden');
                    input.value = '';
                };
                grid.appendChild(div);
            }
        }

        async function prefillFromExisting(id) {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            showLoading(true, "Memuat data lama...");

            const { data, error } = await supabaseClient.from('demplot_monitoring').select('*').eq('ID_Demplot', id).single();
            showLoading(false);

            if (error || !data) return alert("Gagal memuat data");

            // Isi semua field
            document.getElementById('idDemplot').value = data["ID_Demplot"] || '';
            document.getElementById('namaPemilik').value = data["Nama Pemilik Demplot"] || '';
            document.getElementById('telepon').value = data["Telepon"] || '';
            document.getElementById('luasan').value = data["Luasan Demplot"] || '';
            document.getElementById('lokasiGPS').value = data["Lokasi Demplot"] || '';
            document.getElementById('tglTanam').value = data["Tanggal Tanam"] || '';
            document.getElementById('p1').value = data["Tanggal Perlakuan 1"] || '';
            document.getElementById('p2').value = data["Tanggal Perlakuan 2"] || '';
            document.getElementById('p3').value = data["Tanggal Perlakuan 3"] || '';
            document.getElementById('p4').value = data["Tanggal Perlakuan 4"] || '';
            document.getElementById('keterangan').value = data["Keterangan"] || '';

            // Tampilkan foto lama
            existingPhotoUrls = data["Foto"] ? data["Foto"].split(',') : [];
            isUpdateMode = true;
            displayExistingPhotos();

            alert("✅ Data lama dimuat. Foto lama sudah ditampilkan.");
        }

        function displayExistingPhotos() {
            const grid = document.getElementById('photoGrid');
            const slots = grid.children;

            // Kosongkan dulu semua slot
            for (let slot of slots) {
                const preview = slot.querySelector('.photoPreview');
                const icon = slot.querySelector('i');
                const delBtn = slot.querySelector('.delete-btn');
                const input = slot.querySelector('.photoInput');
                
                preview.src = '';
                preview.classList.add('hidden');
                icon.classList.remove('hidden');
                delBtn.classList.add('hidden');
                input.value = '';
            }

            // Tampilkan foto lama
            existingPhotoUrls.forEach((url, index) => {
                if (index < 4) {
                    const slot = slots[index];
                    const preview = slot.querySelector('.photoPreview');
                    const icon = slot.querySelector('i');
                    const delBtn = slot.querySelector('.delete-btn');

                    preview.src = url;
                    preview.classList.remove('hidden');
                    icon.classList.add('hidden');
                    delBtn.classList.remove('hidden');

                    // Hapus foto lama jika tombol delete ditekan
                    delBtn.onclick = (e) => {
                        e.stopImmediatePropagation();
                        existingPhotoUrls.splice(index, 1);
                        displayExistingPhotos(); // refresh
                    };
                }
            });
        }

        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if (!id) return alert("ID belum ada!");

            showLoading(true, "Menyimpan...");

            // Ambil foto baru yang diupload
            const inputs = document.querySelectorAll('.photoInput');
            let newUrls = [];

            for (let inp of inputs) {
                if (inp.files[0]) {
                    const b64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onload = e => r(e.target.result.split(',')[1]);
                        fr.readAsDataURL(inp.files[0]);
                    });
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ filename: "IMG_" + id + "_" + Date.now() + ".jpg", image: b64 })
                    });
                    const j = await res.json();
                    if (j.status === "success") newUrls.push(j.url);
                }
            }

            // Gabungkan foto lama (yang masih ada) + foto baru
            const finalPhotos = [...existingPhotoUrls, ...newUrls].join(',');

            const payload = {
                "ID_Demplot": id,
                "Nama Pemilik Demplot": document.getElementById('namaPemilik').value,
                "Telepon": document.getElementById('telepon').value,
                "Luasan Demplot": document.getElementById('luasan').value,
                "Lokasi Demplot": document.getElementById('lokasiGPS').value,
                "Foto": finalPhotos,
                "Tanggal Tanam": document.getElementById('tglTanam').value || null,
                "Tanggal Perlakuan 1": document.getElementById('p1').value || null,
                "Tanggal Perlakuan 2": document.getElementById('p2').value || null,
                "Tanggal Perlakuan 3": document.getElementById('p3').value || null,
                "Tanggal Perlakuan 4": document.getElementById('p4').value || null,
                "Keterangan": document.getElementById('keterangan').value,
                "last_edited": activeUser.email
            };

            const { error } = await supabaseClient.from('demplot_monitoring').upsert(payload);
            showLoading(false);

            if (error) {
                alert("Gagal menyimpan: " + error.message);
            } else {
                alert("✅ Data berhasil disimpan!");
                location.reload();
            }
        }

        // Fungsi lain (detectGPS, autoFillWilayah, dll) tetap sama seperti sebelumnya
        // ... (saya singkat untuk menghemat ruang)

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // Fungsi lainnya (detectGPS, autoFillWilayah, generateIDManual, dll) tetap seperti script sebelumnya
        // Jika butuh versi super lengkap, ketik "KIRIM LENGKAP"
    </script>
</body>
</html>
