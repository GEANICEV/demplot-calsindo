    <script>
        const SB_URL = "https://adlsyyualatelwwkftyf.supabase.co";
        const SB_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbHN5eXVhbGF0ZWx3d2tmdHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDY3MzcsImV4cCI6MjA4NjU4MjczN30.QG7BL1d5OORWX6U6TGvz5-1IgjjsT8xexGUwwKM8AH4";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyIfannGC5N-oykQAiRXfL4d62txBsxM1upcao6qkuuBFV9l9AyoRnBYsnAcwCj8TFfmA/exec";

        const supabaseClient = supabase.createClient(SB_URL, SB_ANON_KEY);
        let activeUser = null;
        let currentNearbyRecords = [];
        let existingPhotoUrls = [];

        window.onload = async () => {

        function showLoginForm() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');

        function showRegisterForm() {

        // ==================== AUTH + NAMA DARI TABEL MEMBERS ====================
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                activeUser = user;

                // Ambil nama dari tabel members berdasarkan id
                const { data: member } = await supabaseClient
                    .from('members')
                    .select('full_name')
                    .eq('id', user.id)
                    .single();

                const displayName = member?.full_name || user.email;
                document.getElementById('userNameDisplay').innerText = "User: " + displayName;

                document.getElementById('appView').classList.remove('hidden-view');
                document.getElementById('authView').classList.add('hidden-view');
            } else {
                document.getElementById('authView').classList.remove('hidden-view');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
           
            if (!email || !pass) {
                alert("Email dan Password harus diisi!");
                return;
            }
           
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) {
                alert("Login gagal: " + error.message);
            } else {
                checkSession();
            }
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
           
            if (!name || !email || !pass) {
                alert("Nama, Email, dan Password harus diisi!");
                return;
            }
           
            // 1. Buat akun di auth
            const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
           
            if (error) {
                alert("Registrasi gagal: " + error.message);
                return;
            }

            // 2. Simpan ke tabel members (menggunakan kolom id dan full_name)
            const { error: memberError } = await supabaseClient
                .from('members')
                .insert({
                    id: data.user.id,
                    full_name: name,
                    email: email,
                    role: 'petugas'
                });

            if (memberError) {
                alert("Akun dibuat, tapi gagal menyimpan nama: " + memberError.message);
            } else {
                alert("Akun berhasil dibuat! Silakan login.");
                showLoginForm();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // ==================== FOTO GRID ====================
        function initPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-gray-100 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden';
                div.innerHTML = `
                    <input type="file" accept="image/*" capture="environment" hidden class="photoInput">
                    <img class="absolute inset-0 w-full h-full object-cover hidden photoPreview">
                    <i class="fas fa-camera text-3xl text-gray-300"></i>
                    <button class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full hidden delete-btn">×</button>
                `;
                const input = div.querySelector('.photoInput');
                const preview = div.querySelector('.photoPreview');
                const icon = div.querySelector('i');
                const delBtn = div.querySelector('.delete-btn');

                div.onclick = () => input.click();
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (re) => {
                            preview.src = re.target.result;
                            preview.classList.remove('hidden');
                            icon.classList.add('hidden');
                            delBtn.classList.remove('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                delBtn.onclick = (e) => {
                    e.stopImmediatePropagation();
                    preview.src = '';
                    preview.classList.add('hidden');
                    icon.classList.remove('hidden');
                    delBtn.classList.add('hidden');
                    input.value = '';
                };
                grid.appendChild(div);
            }
        }

        function displayExistingPhotos() {
            const grid = document.getElementById('photoGrid');
            const slots = grid.children;
            for (let slot of slots) {
                const preview = slot.querySelector('.photoPreview');
                const icon = slot.querySelector('i');
                const delBtn = slot.querySelector('.delete-btn');
                const input = slot.querySelector('.photoInput');
                preview.src = '';
                preview.classList.add('hidden');
                icon.classList.remove('hidden');
                delBtn.classList.add('hidden');
                input.value = '';
            }
            existingPhotoUrls.forEach((url, index) => {
                if (index < 4) {
                    const slot = slots[index];
                    const preview = slot.querySelector('.photoPreview');
                    const icon = slot.querySelector('i');
                    const delBtn = slot.querySelector('.delete-btn');
                    preview.src = url;
                    preview.classList.remove('hidden');
                    icon.classList.add('hidden');
                    delBtn.classList.remove('hidden');
                    delBtn.onclick = (e) => {
                        e.stopImmediatePropagation();
                        existingPhotoUrls.splice(index, 1);
                        displayExistingPhotos();
                    };
                }
            });
        }

        async function prefillFromExisting(id) {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            const { data, error } = await supabaseClient.from('demplot_monitoring').select('*').eq('ID_Demplot', id).single();
            if (error || !data) return alert("Gagal memuat data lama");

            document.getElementById('idDemplot').value = data["ID_Demplot"] || '';
            document.getElementById('namaPemilik').value = data["Nama Pemilik Demplot"] || '';
            document.getElementById('telepon').value = data["Telepon"] || '';
            document.getElementById('luasan').value = data["Luasan Demplot"] || '';
            document.getElementById('lokasiGPS').value = data["Lokasi Demplot"] || '';
            document.getElementById('tglTanam').value = data["Tanggal Tanam"] || '';
            document.getElementById('p1').value = data["Tanggal Perlakuan 1"] || '';
            document.getElementById('p2').value = data["Tanggal Perlakuan 2"] || '';
            document.getElementById('p3').value = data["Tanggal Perlakuan 3"] || '';
            document.getElementById('p4').value = data["Tanggal Perlakuan 4"] || '';
            document.getElementById('keterangan').value = data["Keterangan"] || '';

            existingPhotoUrls = data["Foto"] ? data["Foto"].split(',') : [];
            isUpdateMode = true;
            displayExistingPhotos();
            alert("✅ Data lama dimuat termasuk fotonya.");
        }

        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if (!id) return alert("ID belum ada!");

            const inputs = document.querySelectorAll('.photoInput');
            let newUrls = [];
            for (let inp of inputs) {
                if (inp.files[0]) {
                    const b64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onload = e => r(e.target.result.split(',')[1]);
                        fr.readAsDataURL(inp.files[0]);
                    });
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ filename: "IMG_" + id + "_" + Date.now() + ".jpg", image: b64 }) });
                    const j = await res.json();
                    if (j.status === "success") newUrls.push(j.url);
                }
            }
            const finalPhotos = [...existingPhotoUrls, ...newUrls].join(',');

            const payload = {
                "ID_Demplot": id,
                "Nama Pemilik Demplot": document.getElementById('namaPemilik').value,
                "Telepon": document.getElementById('telepon').value,
                "Luasan Demplot": document.getElementById('luasan').value,
                "Lokasi Demplot": document.getElementById('lokasiGPS').value,
                "Foto": finalPhotos,
                "Tanggal Tanam": document.getElementById('tglTanam').value || null,
                "Tanggal Perlakuan 1": document.getElementById('p1').value || null,
                "Tanggal Perlakuan 2": document.getElementById('p2').value || null,
                "Tanggal Perlakuan 3": document.getElementById('p3').value || null,
                "Tanggal Perlakuan 4": document.getElementById('p4').value || null,
                "Keterangan": document.getElementById('keterangan').value,
                "last_edited": activeUser.email
            };

            const { error } = await supabaseClient.from('demplot_monitoring').upsert(payload);
            if (error) alert("Gagal menyimpan: " + error.message);
            else {
                alert("✅ Data berhasil disimpan!");
                location.reload();
            }
        }

        // ==================== DETEKSI LOKASI ====================
        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function parseCoordinatesFromUrl(url) {
            if (!url) return null;
            const match = url.match(/q=([-\d.]+),([-\d.]+)/);
            return match ? { lat: parseFloat(match[1]), lng: parseFloat(match[2]) } : null;
        }

        async function checkExistingNearby(currentLat, currentLng) {
            const { data, error } = await supabaseClient.from('demplot_monitoring').select('ID_Demplot, "Nama Pemilik Demplot", "Lokasi Demplot"');
            if (error || !data) return false;

            const nearby = [];
            data.forEach(record => {
                const coords = parseCoordinatesFromUrl(record["Lokasi Demplot"]);
                if (coords) {
                    const dist = getDistanceFromLatLonInMeters(currentLat, currentLng, coords.lat, coords.lng);
                    if (dist <= 50) {
                        nearby.push({ id: record.ID_Demplot, nama: record["Nama Pemilik Demplot"] || "Tanpa Nama", distance: Math.round(dist) });
                    }
                }
            });

            if (nearby.length > 0) {
                currentNearbyRecords = nearby;
                showNearbyModal();
                return true;
            }
            return false;
        }

        function showNearbyModal() {
            const modal = document.getElementById('locationChoiceModal');
            const list = document.getElementById('nearbyList');
            list.innerHTML = '';
            currentNearbyRecords.forEach(r => {
                const div = document.createElement('div');
                div.className = 'bg-gray-50 border rounded-2xl p-4 flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <div class="font-mono text-sm font-bold">${r.id}</div>
                        <div class="text-sm">${r.nama}</div>
                        <div class="text-xs text-emerald-600">≈ ${r.distance} meter</div>
                    </div>
                    <button onclick="prefillFromExisting('${r.id}')" class="bg-emerald-600 text-white text-xs px-4 py-2 rounded-xl font-bold">Update</button>
                `;
                list.appendChild(div);
            });
            modal.classList.remove('hidden');
        }

        function chooseCreateNew() {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            const gps = document.getElementById('lokasiGPS').value;
            const match = gps.match(/q=([-\d.]+),([-\d.]+)/);
            if (match) autoFillWilayah(parseFloat(match[1]), parseFloat(match[2]));
        }

        function detectGPS() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('lokasiGPS').value = `https://maps.google.com/?q=${lat},${lng}`;
               
                const hasNearby = await checkExistingNearby(lat, lng);
                if (!hasNearby) await autoFillWilayah(lat, lng);
            }, (e) => {
                alert("GPS Error: " + e.message);
            }, { enableHighAccuracy: true });
        }

        async function autoFillWilayah(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`;
                const res = await fetch(url);
                const data = await res.json();
                if (!data || !data.address) return;

                const addr = data.address;
                const satProv = normalize(addr.state || addr.region || "");
                const provOpts = document.getElementById('selProvinsi').options;

                let provinceMatched = false;
                for (let i = 1; i < provOpts.length; i++) {
                    const pNameNorm = normalize(provOpts[i].text);
                    const isExact = satProv === pNameNorm;
                    const isStrongMatch = (satProv.includes(pNameNorm) && pNameNorm.length >= 5) || (pNameNorm.includes(satProv) && satProv.length >= 5);
                    if (isExact || isStrongMatch) {
                        document.getElementById('selProvinsi').value = provOpts[i].value;
                        await loadCities(provOpts[i].value);
                        provinceMatched = true;
                        break;
                    }
                }
                if (!provinceMatched) {
                    alert("Gagal mendeteksi Provinsi otomatis. Silakan pilih manual.");
                    return;
                }

                const satKota = normalize(addr.city || addr.county || addr.town || addr.municipality || "");
                const kotaOpts = document.getElementById('selKota').options;
                for (let i = 1; i < kotaOpts.length; i++) {
                    const kNameNorm = normalize(kotaOpts[i].text);
                    if (satKota === kNameNorm || satKota.includes(kNameNorm) || kNameNorm.includes(satKota)) {
                        document.getElementById('selKota').value = kotaOpts[i].value;
                        await loadDistricts(kotaOpts[i].value);
                        break;
                    }
                }

                const potentialKec = [addr.suburb, addr.district, addr.village, addr.municipality, addr.town, addr.city_district].filter(Boolean).map(n => normalize(n)).filter(n => n.length > 2);
                const kecOpts = document.getElementById('selKecamatan').options;
                let foundKec = false;
                for (let target of potentialKec) {
                    for (let i = 1; i < kecOpts.length; i++) {
                        const optNorm = normalize(kecOpts[i].text);
                        const isMatch = optNorm === target || optNorm.includes(target) || target.includes(optNorm) || (target.split(' ').some(w => w.length > 3 && optNorm.includes(w)) && optNorm.split(' ').some(w => w.length > 3 && target.includes(w)));
                        if (isMatch) {
                            document.getElementById('selKecamatan').value = kecOpts[i].value;
                            foundKec = true;
                            break;
                        }
                    }
                    if (foundKec) break;
                }

                if (foundKec) await generateIDManual();
            } catch (e) {
                console.error(e);
            }
        }

        async function generateIDManual() {
            const pOpt = document.querySelector('#selProvinsi option:checked');
            const kOpt = document.querySelector('#selKota option:checked');
            const dOpt = document.querySelector('#selKecamatan option:checked');
            if (!pOpt || !kOpt || !dOpt) return;

            const cleanP = getShortProv(pOpt.dataset.name);
            const cleanK = toPascalCaseID(kOpt.dataset.name);
            const cleanD = toPascalCaseID(dOpt.dataset.name);
            const prefix = cleanP + "_" + cleanK + "_" + cleanD;

            const { data } = await supabaseClient.from('demplot_monitoring').select('ID_Demplot').ilike('ID_Demplot', prefix + '%');
            const existing = new Set();
            if (data) data.forEach(row => {
                const num = parseInt(row.ID_Demplot.split('_').pop());
                if (!isNaN(num)) existing.add(num);
            });

            let next = 1;
            while (existing.has(next)) next++;
            if (next > 999) next = 999;

            document.getElementById('idDemplot').value = prefix + "_" + next.toString().padStart(3, '0');
        }

        function getShortProv(fullName) {
            const n = fullName.toUpperCase();
            if (n.includes("JAWA TIMUR")) return "Jatim";
            if (n.includes("JAWA TENGAH")) return "Jateng";
            if (n.includes("JAWA BARAT")) return "Jabar";
            if (n.includes("NUSA TENGGARA BARAT")) return "NTB";
            if (n.includes("NUSA TENGGARA TIMUR")) return "NTT";
            if (n.includes("YOGYAKARTA")) return "DIY";
            if (n.includes("JAKARTA")) return "DKI";
            return toPascalCaseID(fullName);
        }

        function normalize(str) {
            if (!str) return '';
            return str.toLowerCase().replace(/\b(kabupaten|kota|kecamatan|kec\.|regency|city|district|suburb|village|municipality|town|kelurahan|desa|provinsi)\b/gi, '').replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, ' ');
        }

        function toTitleCaseDisplay(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "").toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function toPascalCaseID(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "").toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
        }

        async function loadProvinces() {
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json");
            const data = await res.json();
            let html = '<option value="">Pilih Prov</option>';
            data.forEach(p => html += `<option value="${p.id}" data-name="${p.name}">${toTitleCaseDisplay(p.name)}</option>`);
            document.getElementById('selProvinsi').innerHTML = html;
        }

        async function loadCities(pid) {
            if (!pid) return;
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${pid}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kota</option>';
            data.forEach(c => html += `<option value="${c.id}" data-name="${c.name}">${toTitleCaseDisplay(c.name)}</option>`);
            document.getElementById('selKota').innerHTML = html;
        }

        async function loadDistricts(cid) {
            if (!cid) return;
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${cid}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kecamatan</option>';
            data.forEach(d => html += `<option value="${d.id}" data-name="${d.name}">${toTitleCaseDisplay(d.name)}</option>`);
            document.getElementById('selKecamatan').innerHTML = html;
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        function unlockLocation() {
            document.getElementById('selProvinsi').disabled = false;
            document.getElementById('selKota').disabled = false;
            document.getElementById('selKecamatan').disabled = false;
            document.getElementById('locationStatus').classList.add('hidden');
        }
    </script>
</body>
