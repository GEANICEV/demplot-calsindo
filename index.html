<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Calsindo - PWA Version</title>
   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calsindo">
    <link rel="apple-touch-icon" href="calsindo.jpeg">
   
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

<body class="bg-gray-50">
    <div id="authView" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <div class="text-center mb-8">
                <img src="calsindo.jpeg" class="h-20 mx-auto mb-4 object-contain" alt="Logo Calsindo">

            </div>

                <input type="email" id="authEmail" placeholder="Email" class="w-full border rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="authPass" placeholder="Password" class="w-full border rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" id="btnLogin" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">LOGIN</button>
                <button onclick="handleRegister()" id="btnReg" class="w-full bg-gray-100 text-gray-600 font-semibold py-3 rounded-xl hover:bg-gray-200 transition-all text-sm">DAFTAR AKUN BARU</button>
            </div>
        </div>
    </div>
    
    <div id="appView" class="hidden-view">
        <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
            <div>
                <h1 class="font-bold text-base text-gray-800 leading-tight">Monitoring Calsindo</h1>
                <p id="userNameDisplay" class="text-[10px] text-blue-600 font-bold uppercase tracking-wider italic">User: Petugas</p>
            </div>
            <button onclick="handleLogout()" class="text-gray-400 p-2"><i class="fas fa-sign-out-alt text-lg"></i></button>
        </header>
        
        <main class="max-w-md mx-auto p-4 space-y-5">
            <img src="calsindo.jpeg" class="h-24 mx-auto mb-4 object-contain" alt="Logo Calsindo">
            
            <!-- Tombol Deteksi Lokasi -->
            <button onclick="detectGPS()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fas fa-location-crosshairs text-xl"></i>
                DETEKSI LOKASI &amp; ID OTOMATIS
            </button>
            
            <!-- WILAYAH -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Provinsi</label>
                        <select id="selProvinsi" onchange="loadCities(this.value)" class="w-full border rounded-lg p-2 text-sm h-10 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Kota/Kab</label>
                        <select id="selKota" onchange="loadDistricts(this.value)" class="w-full border rounded-lg p-2 text-sm h-10 outline-none"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Kecamatan</label>
                    <select id="selKecamatan" onchange="generateIDManual()" class="w-full border rounded-lg p-2 text-sm h-10 outline-none"></select>
                </div>
                
                <!-- STATUS LOKASI OTOMATIS -->
                <div id="locationStatus" class="mt-2 text-xs text-emerald-600 flex items-center gap-2 hidden">
                    <i class="fas fa-lock mr-1"></i>
                    <span id="statusText">Lokasi &amp; ID otomatis dari GPS</span>
                    <button onclick="unlockLocation()" class="ml-auto text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded hover:bg-emerald-200">Buka Kunci</button>
                </div>
            </div>
            
            <!-- FORM DATA -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">ID Demplot (Auto)</label>
                    <input type="text" id="idDemplot" readonly class="w-full border rounded-xl p-3 text-sm font-mono font-bold tracking-tighter">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Nama Pemilik</label>
                    <input type="text" id="namaPemilik" class="w-full border rounded-xl p-3 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Telepon</label>
                        <input type="tel" id="telepon" class="w-full border rounded-xl p-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Luasan (Ha)</label>
                        <input type="number" step="0.01" id="luasan" class="w-full border rounded-xl p-3 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Lokasi GPS</label>
                    <input type="text" id="lokasiGPS" readonly class="w-full border rounded-xl p-3 text-[10px] text-blue-600 underline overflow-hidden text-ellipsis">
                </div>
            </div>
            
            <!-- FOTO -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-[10px] font-bold text-gray-400 mb-3 uppercase">Foto Dokumentasi (Maks 4)</label>
                <div class="grid grid-cols-4 gap-2">
                    <template id="photoTemplate">
                        <div class="aspect-square bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center cursor-pointer relative overflow-hidden">
                            <input type="file" accept="image/*" capture="environment" hidden class="photoInput">
                            <img class="absolute inset-0 w-full h-full object-cover hidden photoPreview">
                            <i class="fas fa-camera text-gray-300"></i>
                        </div>
                    </template>
                    <div id="photoGrid" class="contents"></div>
                </div>
            </div>
            
            <!-- TANGGAL -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Tanggal Tanam</label>
                    <input type="date" id="tglTanam" class="w-full border rounded-xl p-3 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P1</label>
                        <input type="date" id="p1" class="w-full border rounded-lg p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P2</label>
                        <input type="date" id="p2" class="w-full border rounded-lg p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P3</label>
                        <input type="date" id="p3" class="w-full border rounded-lg p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P4</label>
                        <input type="date" id="p4" class="w-full border rounded-lg p-2 text-sm">
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Keterangan</label>
                <textarea id="keterangan" rows="3" class="w-full border rounded-xl p-3 text-sm"></textarea>
            </div>
            
            <button onclick="submitData()" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-5 rounded-3xl shadow-xl active:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i>
                SIMPAN DATA KE CLOUD
            </button>
        </main>
    </div>
    
    <div id="loadingOverlay" class="fixed inset-0 bg-black/70 z-[100] hidden flex flex-col items-center justify-center text-white">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-14 w-14 mb-4"></div>
        <p id="loadingText" class="text-sm font-semibold italic">Processing...</p>
    </div>
    
    <script>
        const SB_URL = "https://adlsyyualatelwwkftyf.supabase.co";
        const SB_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbHN5eXVhbGF0ZWx3d2tmdHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDY3MzcsImV4cCI6MjA4NjU4MjczN30.QG7BL1d5OORWX6U6TGvz5-1IgjjsT8xexGUwwKM8AH4";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyIfannGC5N-oykQAiRXfL4d62txBsxM1upcao6qkuuBFV9l9AyoRnBYsnAcwCj8TFfmA/exec";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_ANON_KEY);
        let activeUser = null;
        
        window.onload = async () => {
            initPhotoGrid();
            checkSession();
            await loadProvinces();
        };
        
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                activeUser = user;
                showView('appView');
                document.getElementById('userNameDisplay').innerText = "User: " + user.email;
            } else {
                showView('authView');
            }
        }
        
        function showView(id) {
            document.getElementById('authView').classList.add('hidden-view');
            document.getElementById('appView').classList.add('hidden-view');
            document.getElementById(id).classList.remove('hidden-view');
        }
        
        async function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            showLoading(true, "Logging in...");
            const { error } = await supabaseClient.auth.signInWithPassword({ email: email, password: pass });
            showLoading(false);
            if (error) return alert(error.message);
            checkSession();
        }
        
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
        
        // ==================== FUNGSI NORMALISASI NAMA (BARU & LEBIH KUAT) ====================
        function normalize(str) {
            if (!str) return '';
            return str.toLowerCase()
                .replace(/\b(kabupaten|kota|kecamatan|kec\.|regency|city|district|suburb|village|municipality|town|kelurahan|desa|provinsi|kecamatan)\b/gi, '')
                .replace(/[^a-z0-9\s]/g, '')
                .trim()
                .replace(/\s+/g, ' ');
        }
        
        function toTitleCaseDisplay(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "")
                      .toLowerCase()
                      .split(' ')
                      .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                      .join(' ');
        }
        
        function toPascalCaseID(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "")
                      .toLowerCase()
                      .split(' ')
                      .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                      .join('');
        }
        
        async function loadProvinces() {
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json");
            const data = await res.json();
            let html = '<option value="">Pilih Prov</option>';
            data.forEach(p => html += '<option value="' + p.id + '" data-name="' + p.name + '">' + toTitleCaseDisplay(p.name) + '</option>');
            document.getElementById('selProvinsi').innerHTML = html;
        }
        
        async function loadCities(pid) {
            if (!pid) return;
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/regencies/" + pid + ".json");
            const data = await res.json();
            let html = '<option value="">Pilih Kota</option>';
            data.forEach(c => html += '<option value="' + c.id + '" data-name="' + c.name + '">' + toTitleCaseDisplay(c.name) + '</option>');
            document.getElementById('selKota').innerHTML = html;
        }
        
        async function loadDistricts(cid) {
            if (!cid) return;
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/districts/" + cid + ".json");
            const data = await res.json();
            let html = '<option value="">Pilih Kecamatan</option>';
            data.forEach(d => html += '<option value="' + d.id + '" data-name="' + d.name + '">' + toTitleCaseDisplay(d.name) + '</option>');
            document.getElementById('selKecamatan').innerHTML = html;
        }
        
        // ==================== DETEKSI LOKASI YANG SUDAH DIPERBAIKI ====================
        async function autoFillWilayah(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (!data || !data.address) {
                    alert("Data lokasi dari satelit tidak lengkap. Silakan pilih manual.");
                    return;
                }
                
                const addr = data.address;
                const noise = /jalan |raya |gang |blok |no\. |perumahan |residence |regency |village |kelurahan /gi;
                
                // === PROVINSI ===
                const satProv = normalize(addr.state || addr.region || "");
                const provOpts = document.getElementById('selProvinsi').options;
                let provSet = false;
                
                for (let i = 1; i < provOpts.length; i++) {
                    const pNameNorm = normalize(provOpts[i].text);
                    if (satProv === pNameNorm || satProv.includes(pNameNorm) || pNameNorm.includes(satProv)) {
                        document.getElementById('selProvinsi').value = provOpts[i].value;
                        await loadCities(provOpts[i].value);
                        provSet = true;
                        break;
                    }
                }
                
                // === KOTA / KABUPATEN ===
                const satKotaRaw = addr.city || addr.county || addr.town || addr.municipality || "";
                const satKota = normalize(satKotaRaw);
                const kotaOpts = document.getElementById('selKota').options;
                let kotaSet = false;
                
                for (let i = 1; i < kotaOpts.length; i++) {
                    const kNameNorm = normalize(kotaOpts[i].text);
                    if (satKota === kNameNorm || satKota.includes(kNameNorm) || kNameNorm.includes(satKota)) {
                        document.getElementById('selKota').value = kotaOpts[i].value;
                        await loadDistricts(kotaOpts[i].value);
                        kotaSet = true;
                        break;
                    }
                }
                
                // === KECAMATAN (DENGAN BANYAK KEMUNGKINAN + OVERLAP KATA) ===
                const potentialKec = [
                    addr.suburb, addr.district, addr.village, addr.municipality,
                    addr.town, addr.city_district, addr.neighbourhood, addr.hamlet
                ].filter(Boolean).map(n => normalize(n)).filter(n => n.length > 2);
                
                const kecOpts = document.getElementById('selKecamatan').options;
                let foundKec = false;
                
                for (let target of potentialKec) {
                    for (let i = 1; i < kecOpts.length; i++) {
                        const optNorm = normalize(kecOpts[i].text);
                        
                        const isMatch = 
                            optNorm === target ||
                            optNorm.includes(target) ||
                            target.includes(optNorm) ||
                            // Cek overlap kata penting
                            (target.split(' ').some(w => w.length > 3 && optNorm.includes(w)) &&
                             optNorm.split(' ').some(w => w.length > 3 && target.includes(w)));
                        
                        if (isMatch) {
                            document.getElementById('selKecamatan').value = kecOpts[i].value;
                            foundKec = true;
                            break;
                        }
                    }
                    if (foundKec) break;
                }
                
                // === KUNCI MENU + GENERATE ID ===
                const statusEl = document.getElementById('locationStatus');
                const statusText = document.getElementById('statusText');
                
                if (foundKec) {
                    await generateIDManual();
                    
                    // KUNCI SEMUA DROPDOWN
                    document.getElementById('selProvinsi').disabled = true;
                    document.getElementById('selKota').disabled = true;
                    document.getElementById('selKecamatan').disabled = true;
                    
                    statusText.innerHTML = "Lokasi &amp; ID otomatis dari GPS";
                    statusEl.classList.remove('hidden');
                    
                } else if (kotaSet) {
                    // Kunci prov & kota, biarkan kecamatan manual
                    document.getElementById('selProvinsi').disabled = true;
                    document.getElementById('selKota').disabled = true;
                    
                    statusText.innerHTML = "Prov &amp; Kota otomatis. Pilih Kecamatan untuk generate ID";
                    statusEl.classList.remove('hidden');
                    
                    // User tinggal pilih kecamatan → ID otomatis ter-generate via onchange
                } else if (provSet) {
                    document.getElementById('selProvinsi').disabled = true;
                    statusText.innerHTML = "Provinsi otomatis. Pilih Kota &amp; Kecamatan";
                    statusEl.classList.remove('hidden');
                }
                
            } catch (e) {
                console.error("Geocoding Error:", e);
                alert("Gagal membaca lokasi dari satelit. Silakan isi manual.");
            }
        }
        
        function detectGPS() {
            showLoading(true, "Mengunci Satelit GPS...");
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // URL Google Maps yang BENAR
                document.getElementById('lokasiGPS').value = `https://www.google.com/maps?q=${lat},${lng}`;
                
                await autoFillWilayah(lat, lng);
                showLoading(false);
            }, (e) => {
                showLoading(false);
                alert("GPS Error: " + e.message + "\n\nPastikan GPS aktif dan izinkan akses lokasi.");
            }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
        }
        
        async function generateIDManual() {
            const pOpt = document.querySelector('#selProvinsi option:checked');
            const kOpt = document.querySelector('#selKota option:checked');
            const dOpt = document.querySelector('#selKecamatan option:checked');
            
            if (!pOpt || !kOpt || !dOpt) return;
            
            const cleanP = getShortProv(pOpt.dataset.name);
            const cleanK = toPascalCaseID(kOpt.dataset.name);
            const cleanD = toPascalCaseID(dOpt.dataset.name);
            
            const prefix = cleanP + "_" + cleanK + "_" + cleanD;
            
            showLoading(true, "Mengecek ID Terakhir...");
            const { data } = await supabaseClient
                .from('demplot_monitoring')
                .select('ID_Demplot')
                .ilike('ID_Demplot', prefix + '%');
            
            let next = 1;
            if (data && data.length > 0) {
                const nums = data.map(i => parseInt(i.ID_Demplot.split('_').pop())).filter(n => !isNaN(n));
                if (nums.length > 0) next = Math.max(...nums) + 1;
            }
            
            document.getElementById('idDemplot').value = prefix + "_" + next.toString().padStart(3, '0');
            showLoading(false);
        }
        
        function getShortProv(fullName) {
            const n = fullName.toUpperCase();
            if (n.includes("JAWA TIMUR")) return "Jatim";
            if (n.includes("JAWA TENGAH")) return "Jateng";
            if (n.includes("JAWA BARAT")) return "Jabar";
            if (n.includes("NUSA TENGGARA BARAT")) return "NTB";
            if (n.includes("NUSA TENGGARA TIMUR")) return "NTT";
            if (n.includes("YOGYAKARTA")) return "DIY";
            if (n.includes("JAKARTA")) return "DKI";
            return toPascalCaseID(fullName);
        }
        
        // ==================== FUNGSI KUNCI / BUKA KUNCI ====================
        function unlockLocation() {
            document.getElementById('selProvinsi').disabled = false;
            document.getElementById('selKota').disabled = false;
            document.getElementById('selKecamatan').disabled = false;
            document.getElementById('locationStatus').classList.add('hidden');
            
            // Opsional: kosongkan ID agar user sadar harus generate ulang
            // document.getElementById('idDemplot').value = '';
        }
        
        function initPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            const temp = document.getElementById('photoTemplate');
            for (let i = 0; i < 4; i++) {
                const clone = temp.content.cloneNode(true);
                const container = clone.querySelector('div');
                const input = clone.querySelector('.photoInput');
                const preview = clone.querySelector('.photoPreview');
                const icon = clone.querySelector('i');
                
                container.onclick = () => input.click();
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (re) => {
                            preview.src = re.target.result;
                            preview.classList.remove('hidden');
                            icon.classList.add('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                grid.appendChild(clone);
            }
        }
        
        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if (!id) return alert("ID Demplot belum terbuat! Silakan deteksi lokasi dulu.");
            
            showLoading(true, "Mengunggah Foto...");
            const inputs = document.querySelectorAll('.photoInput');
            let urls = [];
            
            for (let inp of inputs) {
                if (inp.files[0]) {
                    const b64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onload = (e) => r(e.target.result.split(',')[1]);
                        fr.readAsDataURL(inp.files[0]);
                    });
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            filename: "IMG_" + id + "_" + Date.now() + ".jpg", 
                            image: b64 
                        })
                    });
                    const j = await res.json();
                    if (j.status === "success") urls.push(j.url);
                }
            }
            
            showLoading(true, "Menyimpan ke Cloud...");
            const payload = {
                "ID_Demplot": id,
                "Nama Pemilik Demplot": document.getElementById('namaPemilik').value,
                "Telepon": document.getElementById('telepon').value,
                "Luasan Demplot": document.getElementById('luasan').value,
                "Lokasi Demplot": document.getElementById('lokasiGPS').value,
                "Foto": urls.join(','),
                "Tanggal Tanam": fixDate(document.getElementById('tglTanam').value),
                "Tanggal Perlakuan 1": fixDate(document.getElementById('p1').value),
                "Tanggal Perlakuan 2": fixDate(document.getElementById('p2').value),
                "Tanggal Perlakuan 3": fixDate(document.getElementById('p3').value),
                "Tanggal Perlakuan 4": fixDate(document.getElementById('p4').value),
                "Keterangan": document.getElementById('keterangan').value,
                "last_edited": activeUser.email,
                "created_by": activeUser.email
            };
            
            const { error } = await supabaseClient.from('demplot_monitoring').upsert(payload);
            showLoading(false);
            
            if (error) {
                alert("Gagal menyimpan: " + error.message);
            } else {
                alert("✅ Data berhasil disimpan ke Cloud!");
                location.reload();
            }
        }
        
        function showLoading(show, text) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.toggle('hidden', !show);
            document.getElementById('loadingText').innerText = text || "Processing...";
        }
        
        function fixDate(d) { 
            return d === "" ? null : d; 
        }
    </script>
</body>
</html>
