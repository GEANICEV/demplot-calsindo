        // ==================== INDEXEDDB ====================
        let db;
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("CalsindoDB", 1);
                request.onupgradeneeded = (event) => {
                    db = event.target.result;
                    if (!db.objectStoreNames.contains("pending")) {
                        db.createObjectStore("pending", { keyPath: "id_demplot" });
                    }
                };
                request.onsuccess = (event) => {
                    db = event.target.result;
                    updatePendingBadge();
                    resolve();
                };
                request.onerror = reject;
            });
        }

        function saveToPending(data) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(["pending"], "readwrite");
                const store = tx.objectStore("pending");
                const request = store.put(data);
                request.onsuccess = () => { updatePendingBadge(); resolve(); };
                request.onerror = reject;
            });
        }

        function getAllPending() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(["pending"], "readonly");
                const store = tx.objectStore("pending");
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = reject;
            });
        }

        function deleteFromPending(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(["pending"], "readwrite");
                const store = tx.objectStore("pending");
                const request = store.delete(id);
                request.onsuccess = () => { updatePendingBadge(); resolve(); };
                request.onerror = reject;
            });
        }

        async function updatePendingBadge() {
            const pending = await getAllPending();
            const badge = document.getElementById('pendingBadge');
            const icon = document.getElementById('syncIcon');
            if (pending.length > 0) {
                badge.textContent = pending.length;
                badge.classList.remove('hidden');
                icon.classList.add('text-red-500');
                icon.classList.remove('text-green-500');
            } else {
                badge.classList.add('hidden');
                icon.classList.add('text-green-500');
                icon.classList.remove('text-red-500');
            }
        }

        // ==================== FOTO ====================
        function getProxiedImageUrl(originalUrl) {
            if (!originalUrl) return '';
            if (originalUrl.includes('drive.google.com')) {
                return `https://wsrv.nl/?url=${encodeURIComponent(originalUrl)}`;
            }
            return originalUrl;
        }

        function initPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-gray-100 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden';
                
                div.innerHTML = `
                    <input type="file" accept="image/*" capture="environment" hidden class="cameraInput">
                    <input type="file" accept="image/*" hidden class="galleryInput">
                    <img class="absolute inset-0 w-full h-full object-cover hidden photoPreview"
                         onerror="this.style.display='none'; this.parentElement.querySelector('.error-text').style.display='flex'">
                    <i class="fas fa-camera text-3xl text-gray-300"></i>
                    <div class="error-text absolute inset-0 hidden flex-col items-center justify-center text-red-500 text-xs text-center p-1">
                        <i class="fas fa-exclamation-triangle text-lg mb-1"></i>
                        <span>Gagal memuat foto</span>
                    </div>
                    <button class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full hidden delete-btn">×</button>
                `;
                
                const cameraInput = div.querySelector('.cameraInput');
                const galleryInput = div.querySelector('.galleryInput');
                const preview = div.querySelector('.photoPreview');
                const icon = div.querySelector('i');
                const delBtn = div.querySelector('.delete-btn');

                div.onclick = (e) => {
                    if (e.target === delBtn) return;
                    currentPhotoSlot = div;
                    document.getElementById('photoSourceModal').classList.remove('hidden');
                };

                cameraInput.onchange = (e) => handlePhotoSelected(e, preview, icon, delBtn, cameraInput);
                galleryInput.onchange = (e) => handlePhotoSelected(e, preview, icon, delBtn, galleryInput);

                delBtn.onclick = (e) => {
                    e.stopImmediatePropagation();
                    preview.src = '';
                    preview.classList.add('hidden');
                    icon.classList.remove('hidden');
                    delBtn.classList.add('hidden');
                    cameraInput.value = '';
                    galleryInput.value = '';
                };

                grid.appendChild(div);
            }
        }

        function handlePhotoSelected(e, preview, icon, delBtn, input) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    preview.src = re.target.result;
                    preview.classList.remove('hidden');
                    icon.classList.add('hidden');
                    delBtn.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function displayExistingPhotos() {
            const grid = document.getElementById('photoGrid');
            const slots = grid.children;

            for (let slot of slots) {
                const preview = slot.querySelector('.photoPreview');
                const icon = slot.querySelector('i');
                const delBtn = slot.querySelector('.delete-btn');
                const cameraInput = slot.querySelector('.cameraInput');
                const galleryInput = slot.querySelector('.galleryInput');

                preview.src = '';
                preview.classList.add('hidden');
                icon.classList.remove('hidden');
                delBtn.classList.add('hidden');
                if (cameraInput) cameraInput.value = '';
                if (galleryInput) galleryInput.value = '';
            }

            existingPhotoUrls.forEach((originalUrl, index) => {
                if (index < 4) {
                    const slot = slots[index];
                    const preview = slot.querySelector('.photoPreview');
                    const icon = slot.querySelector('i');
                    const delBtn = slot.querySelector('.delete-btn');
                    const proxiedUrl = getProxiedImageUrl(originalUrl);
                    preview.src = proxiedUrl;
                    preview.classList.remove('hidden');
                    icon.classList.add('hidden');
                    delBtn.classList.remove('hidden');

                    delBtn.onclick = (e) => {
                        e.stopImmediatePropagation();
                        existingPhotoUrls.splice(index, 1);
                        displayExistingPhotos();
                    };
                }
            });
        }

        // ==================== SUBMIT DATA ====================
        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if (!id) return alert("ID belum ada!");

            const inputs = document.querySelectorAll('.cameraInput, .galleryInput');
            let photoDataUrls = [];

            for (let inp of inputs) {
                if (inp.files && inp.files[0]) {
                    const reader = new FileReader();
                    const dataUrl = await new Promise(resolve => {
                        reader.onload = e => resolve(e.target.result);
                        reader.readAsDataURL(inp.files[0]);
                    });
                    photoDataUrls.push(dataUrl);
                }
            }

            const payload = {
                id_demplot: id,
                nama_pemilik: document.getElementById('namaPemilik').value,
                telepon: document.getElementById('telepon').value || "-",
                luasan: document.getElementById('luasan').value,
                lokasi: document.getElementById('lokasiGPS').value,
                tgl_tanam: document.getElementById('tglTanam').value || null,
                p1: document.getElementById('p1').value || null,
                p2: document.getElementById('p2').value || null,
                p3: document.getElementById('p3').value || null,
                p4: document.getElementById('p4').value || null,
                keterangan: document.getElementById('keterangan').value,
                last_updated_by: activeUser?.email || "Unknown",
                created_by: activeUser?.email || "Unknown",
                photos: photoDataUrls,
                timestamp: Date.now()
            };

            await saveToPending(payload);
            resetForm();
            alert("Data disimpan offline. Tekan tombol Sync untuk upload.");

            if (navigator.onLine) {
                setTimeout(() => processPendingQueue(), 800);
            }
        }

        // ==================== SYNC ====================
        async function compressImage(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > 1024) {
                        const ratio = 1024 / width;
                        width = 1024;
                        height = Math.round(height * ratio);
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = dataUrl;
            });
        }

        async function uploadToDrive(dataUrl, fileName) {
            try {
                const compressed = await compressImage(dataUrl);
                const base64 = compressed.split(',')[1];
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ filename: fileName, image: base64 })
                });
                const j = await res.json();
                return j.status === "success" ? j.url : null;
            } catch (e) {
                console.error("Upload error:", e);
                return null;
            }
        }

        async function processPendingQueue() {
            const pending = await getAllPending();
            if (pending.length === 0) return "Tidak ada data pending.";

            let success = 0;
            let fail = 0;

            for (const item of pending) {
                try {
                    const finalPhotoUrls = [];
                    for (let i = 0; i < (item.photos || []).length; i++) {
                        const photo = item.photos[i];
                        if (photo.startsWith('http')) {
                            finalPhotoUrls.push(photo);
                        } else {
                            const fileName = `IMG_${item.id_demplot}_${Date.now()}_${i}.jpg`;
                            const driveUrl = await uploadToDrive(photo, fileName);
                            if (driveUrl) finalPhotoUrls.push(driveUrl);
                        }
                    }

                    let finalCreatedBy = item.created_by;
                    try {
                        const { data: existing } = await supabaseClient
                            .from('demplot_monitoring')
                            .select('created_by')
                            .eq('ID_Demplot', item.id_demplot)
                            .single();
                        if (existing && existing.created_by) finalCreatedBy = existing.created_by;
                    } catch (e) {}

                    const payload = {
                        "ID_Demplot": item.id_demplot,
                        "Nama Pemilik Demplot": item.nama_pemilik,
                        "Telepon": item.telepon,
                        "Luasan Demplot": item.luasan,
                        "Lokasi Demplot": item.lokasi,
                        "Foto": finalPhotoUrls.join(','),
                        "Tanggal Tanam": item.tgl_tanam,
                        "Tanggal Perlakuan 1": item.p1,
                        "Tanggal Perlakuan 2": item.p2,
                        "Tanggal Perlakuan 3": item.p3,
                        "Tanggal Perlakuan 4": item.p4,
                        "Keterangan": item.keterangan,
                        "last_edited": item.last_updated_by,
                        "created_by": finalCreatedBy
                    };

                    await supabaseClient.from('demplot_monitoring').upsert(payload);
                    await deleteFromPending(item.id_demplot);
                    success++;
                } catch (e) {
                    console.error("Sync error:", e);
                    fail++;
                }
            }
            await updatePendingBadge();
            return `Sukses: ${success}, Gagal: ${fail}`;
        }

        async function manualSync() {
            const pending = await getAllPending();
            if (pending.length === 0) {
                alert("Tidak ada data pending.");
                return;
            }
            const result = await processPendingQueue();
            alert(result);
        }

        // ==================== DETEKSI LOKASI ====================
        function detectGPS() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                currentLat = lat;
                currentLng = lng;
                document.getElementById('lokasiGPS').value = `https://maps.google.com/?q=${lat},${lng}`;
               
                const hasNearby = await checkExistingNearby(lat, lng);
                if (!hasNearby) {
                    await autoFillWilayah(lat, lng);
                }
            }, (e) => {
                alert("GPS Error: " + e.message);
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        async function checkExistingNearby(currentLat, currentLng) {
            try {
                const { data, error } = await supabaseClient.from('demplot_monitoring').select('*');
                if (error || !data) return false;

                const nearby = [];
                data.forEach(record => {
                    const coords = parseCoordinatesFromUrl(record["Lokasi Demplot"]);
                    if (coords) {
                        const dist = getDistanceFromLatLonInMeters(currentLat, currentLng, coords.lat, coords.lng);
                        if (dist <= 50) nearby.push(record);
                    }
                });

                if (nearby.length > 0) {
                    currentNearbyRecords = nearby;
                    showNearbyModal();
                    return true;
                }
                return false;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        // ==================== MODAL LOKASI (DIPERBAIKI) ====================
        function showNearbyModal() {
            const modal = document.getElementById('locationChoiceModal');
            const list = document.getElementById('nearbyList');
            list.innerHTML = '';
            
            currentNearbyRecords.forEach((record, index) => {
                const div = document.createElement('div');
                div.className = 'bg-gray-50 border rounded-2xl p-4 flex justify-between items-center mb-2';
                
                div.innerHTML = `
                    <div>
                        <div class="font-mono text-sm font-bold">${record["ID_Demplot"]}</div>
                        <div class="text-sm">${record["Nama Pemilik Demplot"] || "Tanpa Nama"}</div>
                    </div>
                    <button class="update-btn bg-emerald-600 text-white text-xs px-4 py-2 rounded-xl font-bold">Update</button>
                `;
                
                // Event listener yang lebih stabil
                const updateBtn = div.querySelector('.update-btn');
                updateBtn.onclick = () => {
                    selectedNearbyRecord = record;
                    prefillFromExisting();
                };
                
                list.appendChild(div);
            });
            
            modal.classList.remove('hidden');
        }

        function chooseCreateNew() {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            if (currentLat && currentLng) {
                autoFillWilayah(currentLat, currentLng);
            }
        }

        // ==================== PREFILL (DIPERBAIKI) ====================
        async function prefillFromExisting() {
            const modal = document.getElementById('locationChoiceModal');
            modal.classList.add('hidden');

            if (!selectedNearbyRecord) {
                alert("Data tidak ditemukan.");
                return;
            }

            const record = selectedNearbyRecord;

            document.getElementById('idDemplot').value = record["ID_Demplot"] || '';
            document.getElementById('namaPemilik').value = record["Nama Pemilik Demplot"] || '';
            document.getElementById('telepon').value = record["Telepon"] || '';
            document.getElementById('luasan').value = record["Luasan Demplot"] || '';
            document.getElementById('lokasiGPS').value = record["Lokasi Demplot"] || '';
            document.getElementById('tglTanam').value = record["Tanggal Tanam"] || '';
            document.getElementById('p1').value = record["Tanggal Perlakuan 1"] || '';
            document.getElementById('p2').value = record["Tanggal Perlakuan 2"] || '';
            document.getElementById('p3').value = record["Tanggal Perlakuan 3"] || '';
            document.getElementById('p4').value = record["Tanggal Perlakuan 4"] || '';
            document.getElementById('keterangan').value = record["Keterangan"] || '';

            existingPhotoUrls = record["Foto"] ? record["Foto"].split(',') : [];
            isUpdateMode = true;
            displayExistingPhotos();

            // Reset variabel
            selectedNearbyRecord = null;

            alert("✅ Data lama dimuat. Silakan edit dan simpan.");
        }

        function parseCoordinatesFromUrl(url) {
            if (!url) return null;
            const match = url.match(/q=([-\d.]+),([-\d.]+)/);
            return match ? { lat: parseFloat(match[1]), lng: parseFloat(match[2]) } : null;
        }

        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function autoFillWilayah(lat, lng) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);

                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`;
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                const data = await res.json();
                if (!data || !data.address) throw new Error("Data kosong");

                const addr = data.address;

                const provinceName = addr.state || addr.region || "";
                const satProv = normalize(provinceName);
                const provOpts = document.getElementById('selProvinsi').options;

                let provinceMatched = false;
                for (let i = 1; i < provOpts.length; i++) {
                    const pNameNorm = normalize(provOpts[i].text);
                    if (satProv === pNameNorm || (satProv.includes(pNameNorm) && pNameNorm.length >= 5)) {
                        document.getElementById('selProvinsi').value = provOpts[i].value;
                        await loadCities(provOpts[i].value);
                        provinceMatched = true;
                        break;
                    }
                }

                if (!provinceMatched) {
                    alert("Gagal mendeteksi Provinsi. Silakan pilih manual.");
                    return;
                }

                const satKota = normalize(addr.city || addr.county || "");
                const kotaOpts = document.getElementById('selKota').options;
                for (let i = 1; i < kotaOpts.length; i++) {
                    const kNameNorm = normalize(kotaOpts[i].text);
                    if (satKota === kNameNorm || satKota.includes(kNameNorm) || kNameNorm.includes(satKota)) {
                        document.getElementById('selKota').value = kotaOpts[i].value;
                        await loadDistricts(kotaOpts[i].value);
                        break;
                    }
                }

                const possibleKec = [addr.suburb, addr.district, addr.village, addr.municipality].filter(Boolean);
                const kecOpts = document.getElementById('selKecamatan').options;
                let foundKec = false;

                for (let target of possibleKec.map(n => normalize(n))) {
                    for (let i = 1; i < kecOpts.length; i++) {
                        const optNorm = normalize(kecOpts[i].text);
                        if (target === optNorm || target.includes(optNorm) || optNorm.includes(target)) {
                            document.getElementById('selKecamatan').value = kecOpts[i].value;
                            foundKec = true;
                            break;
                        }
                    }
                    if (foundKec) break;
                }

                await generateIDManual();

            } catch (e) {
                console.error(e);
                alert("Gagal mendeteksi lokasi otomatis. Silakan isi manual.");
            }
        }

        async function generateIDManual() {
            const pOpt = document.querySelector('#selProvinsi option:checked');
            const kOpt = document.querySelector('#selKota option:checked');
            const dOpt = document.querySelector('#selKecamatan option:checked');
            if (!pOpt || !kOpt || !dOpt) return;

            const cleanP = getShortProv(pOpt.dataset.name);
            const cleanK = toPascalCaseID(kOpt.dataset.name);
            const cleanD = toPascalCaseID(dOpt.dataset.name);
            const prefix = cleanP + "_" + cleanK + "_" + cleanD;

            const { data } = await supabaseClient.from('demplot_monitoring').select('ID_Demplot').ilike('ID_Demplot', prefix + '%');
            const existing = new Set();
            if (data) data.forEach(row => {
                const num = parseInt(row.ID_Demplot.split('_').pop());
                if (!isNaN(num)) existing.add(num);
            });

            let next = 1;
            while (existing.has(next)) next++;
            if (next > 999) next = 999;

            document.getElementById('idDemplot').value = prefix + "_" + next.toString().padStart(3, '0');
        }

        function getShortProv(fullName) {
            const n = fullName.toUpperCase().trim();
            const provinceMap = {
                "ACEH": "Aceh", "SUMATERA UTARA": "Sumut", "SUMATERA BARAT": "Sumbar",
                "RIAU": "Riau", "JAMBI": "Jambi", "SUMATERA SELATAN": "Sumsel",
                "BENGKULU": "Bengkulu", "LAMPUNG": "Lampung", "KEPULAUAN BANGKA BELITUNG": "Babel",
                "KEPULAUAN RIAU": "Kepri", "DKI JAKARTA": "DKI", "JAWA BARAT": "Jabar",
                "JAWA TENGAH": "Jateng", "DAERAH ISTIMEWA YOGYAKARTA": "DIY", "JAWA TIMUR": "Jatim",
                "BANTEN": "Banten", "BALI": "Bali", "NUSA TENGGARA BARAT": "NTB",
                "NUSA TENGGARA TIMUR": "NTT", "KALIMANTAN BARAT": "Kalbar", "KALIMANTAN TENGAH": "Kalteng",
                "KALIMANTAN SELATAN": "Kalsel", "KALIMANTAN TIMUR": "Kaltim", "KALIMANTAN UTARA": "Kaltara",
                "SULAWESI UTARA": "Sulut", "SULAWESI TENGAH": "Sulteng", "SULAWESI SELATAN": "Sulsel",
                "SULAWESI TENGGARA": "Sultra", "GORONTALO": "Gorontalo", "SULAWESI BARAT": "Sulbar",
                "MALUKU": "Maluku", "MALUKU UTARA": "Malut", "PAPUA": "Papua",
                "PAPUA BARAT": "Papbar", "PAPUA SELATAN": "Papsel", "PAPUA TENGAH": "Papteng",
                "PAPUA PEGUNUNGAN": "Papeg", "PAPUA BARAT DAYA": "PapbarDaya"
            };
            for (const [key, value] of Object.entries(provinceMap)) {
                if (n.includes(key)) return value;
            }
            return toPascalCaseID(fullName);
        }

        function normalize(str) {
            if (!str) return '';
            return str.toLowerCase().replace(/\b(kabupaten|kota|kecamatan|kec\.|regency|city|district|suburb|village|municipality|town|kelurahan|desa|provinsi)\b/gi, '').replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, ' ');
        }

        function toTitleCaseDisplay(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "").toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function toPascalCaseID(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "").toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
        }

        async function loadProvinces() {
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json");
            const data = await res.json();
            let html = '<option value="">Pilih Prov</option>';
            data.forEach(p => html += `<option value="${p.id}" data-name="${p.name}">${toTitleCaseDisplay(p.name)}</option>`);
            document.getElementById('selProvinsi').innerHTML = html;
        }

        async function loadCities(pid) {
            if (!pid) return;
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${pid}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kota</option>';
            data.forEach(c => html += `<option value="${c.id}" data-name="${c.name}">${toTitleCaseDisplay(c.name)}</option>`);
            document.getElementById('selKota').innerHTML = html;
        }

        async function loadDistricts(cid) {
            if (!cid) return;
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${cid}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kecamatan</option>';
            data.forEach(d => html += `<option value="${d.id}" data-name="${d.name}">${toTitleCaseDisplay(d.name)}</option>`);
            document.getElementById('selKecamatan').innerHTML = html;
        }

        // ==================== AUTH ====================
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                activeUser = user;
                const { data: member } = await supabaseClient.from('members').select('full_name').eq('id', user.id).single();
                const displayName = member?.full_name || user.email;
                document.getElementById('userNameDisplay').innerText = "User: " + displayName;
                document.getElementById('appView').classList.remove('hidden-view');
                document.getElementById('authView').classList.add('hidden-view');
            } else {
                document.getElementById('authView').classList.remove('hidden-view');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if (!email || !pass) return alert("Email dan Password harus diisi!");
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Login gagal: " + error.message);
            else checkSession();
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if (!name || !email || !pass) return alert("Nama, Email, dan Password harus diisi!");
           
            const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
            if (error) return alert("Registrasi gagal: " + error.message);

            const { error: memberError } = await supabaseClient.from('members').insert({
                id: data.user.id,
                full_name: name,
                email: email,
                role: 'petugas'
            });

            if (memberError) alert("Gagal menyimpan nama: " + memberError.message);
            else {
                alert("Akun berhasil dibuat! Silakan login.");
                showLoginForm();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // ==================== INIT ====================
        window.onload = async () => {
            await initDB();
            initPhotoGrid();
            checkSession();
            await loadProvinces();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js');
            }
            
            window.addEventListener('online', async () => {
                const pending = await getAllPending();
                if (pending.length > 0) {
                    await processPendingQueue();
                }
            });
        };
    </script>
