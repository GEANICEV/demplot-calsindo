<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Calsindo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calsindo">
    <link rel="apple-touch-icon" href="calsindo.jpeg">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- ==================== AUTH VIEW ==================== -->
    <div id="authView" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <div class="text-center mb-8">
                <!-- LOGO -->
                <img src="calsindo.jpeg" class="h-20 mx-auto mb-4 object-contain" alt="Logo Calsindo">
                <h2 class="text-2xl font-bold text-gray-800">Aplikasi Demplot Calsindo</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" class="w-full border rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="authPass" placeholder="Password" class="w-full border rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">LOGIN</button>
                <button onclick="handleRegister()" class="w-full bg-gray-100 text-gray-600 font-semibold py-3 rounded-xl hover:bg-gray-200 transition-all text-sm">DAFTAR AKUN BARU</button>
            </div>
        </div>
    </div>

    <!-- ==================== APP VIEW ==================== -->
    <div id="appView" class="hidden-view">
        <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <!-- LOGO DI HEADER -->
                <img src="calsindo.jpeg" class="h-9 object-contain" alt="Logo">
                <div>
                    <h1 class="font-bold text-base text-gray-800 leading-tight">Monitoring Calsindo</h1>
                    <p id="userNameDisplay" class="text-[10px] text-blue-600 font-bold uppercase tracking-wider italic">User: Petugas</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="text-gray-400 p-2"><i class="fas fa-sign-out-alt text-lg"></i></button>
        </header>
        
        <main class="max-w-md mx-auto p-4 space-y-5">
            
            <!-- Logo besar di tengah -->
            <div class="text-center">
                <img src="calsindo.jpeg" class="h-20 mx-auto mb-2 object-contain" alt="Logo Calsindo">
            </div>
            
            <button onclick="detectGPS()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fas fa-location-crosshairs text-xl"></i>
                DETEKSI LOKASI &amp; ID OTOMATIS
            </button>
            
            <!-- Form Data -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">ID Demplot (Auto)</label>
                    <input type="text" id="idDemplot" readonly class="w-full border rounded-xl p-3 text-sm font-mono font-bold tracking-tighter">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Nama Pemilik</label>
                    <input type="text" id="namaPemilik" class="w-full border rounded-xl p-3 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Telepon</label>
                        <input type="tel" id="telepon" class="w-full border rounded-xl p-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Luasan (Ha)</label>
                        <input type="number" step="0.01" id="luasan" class="w-full border rounded-xl p-3 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Lokasi GPS</label>
                    <input type="text" id="lokasiGPS" readonly class="w-full border rounded-xl p-3 text-[10px] text-blue-600 underline overflow-hidden text-ellipsis">
                </div>
            </div>
            
            <!-- Foto -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-[10px] font-bold text-gray-400 mb-3 uppercase">Foto Dokumentasi (Maks 4)</label>
                <div id="photoGrid" class="grid grid-cols-4 gap-2"></div>
            </div>
            
            <!-- Tanggal -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Tanggal Tanam</label>
                    <input type="date" id="tglTanam" class="w-full border rounded-xl p-3 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P1</label><input type="date" id="p1" class="w-full border rounded-lg p-2 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P2</label><input type="date" id="p2" class="w-full border rounded-lg p-2 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P3</label><input type="date" id="p3" class="w-full border rounded-lg p-2 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">P4</label><input type="date" id="p4" class="w-full border rounded-lg p-2 text-sm"></div>
                </div>
            </div>
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Keterangan</label>
                <textarea id="keterangan" rows="3" class="w-full border rounded-xl p-3 text-sm"></textarea>
            </div>
            
            <button onclick="submitData()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-3xl shadow-xl active:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i>
                SIMPAN DATA KE CLOUD
            </button>
        </main>
    </div>

    <!-- LOADING -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center">
        <div class="loader w-14 h-14 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin"></div>
    </div>

    <!-- MODAL -->
    <div id="locationChoiceModal" class="fixed inset-0 bg-black/70 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl">
            <h3 class="font-bold text-xl mb-4">Lokasi Sudah Ada</h3>
            <div id="nearbyList" class="space-y-2 mb-4 max-h-64 overflow-auto"></div>
            <button onclick="chooseCreateNew()" class="w-full bg-gray-200 py-3 rounded-2xl font-bold">Buat Lokasi Baru</button>
        </div>
    </div>

    <script>
        // ==================== KONFIGURASI ====================
        const SB_URL = "https://adlsyyualatelwwkftyf.supabase.co";
        const SB_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbHN5eXVhbGF0ZWx3d2tmdHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDY3MzcsImV4cCI6MjA4NjU4MjczN30.QG7BL1d5OORWX6U6TGvz5-1IgjjsT8xexGUwwKM8AH4";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyIfannGC5N-oykQAiRXfL4d62txBsxM1upcao6qkuuBFV9l9AyoRnBYsnAcwCj8TFfmA/exec";

        const supabaseClient = supabase.createClient(SB_URL, SB_ANON_KEY);
        let activeUser = null;
        let currentNearbyRecords = [];
        let existingPhotoUrls = [];
        let isUpdateMode = false;

        // ==================== INISIALISASI ====================
        window.onload = async () => {
            initPhotoGrid();
            checkSession();
            await loadProvinces();
        };

        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                activeUser = user;
                document.getElementById('appView').classList.remove('hidden-view');
                document.getElementById('authView').classList.add('hidden-view');
                document.getElementById('userNameDisplay').innerText = "User: " + user.email;
            } else {
                document.getElementById('authView').classList.remove('hidden-view');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if (!email || !pass) return alert("Email dan Password harus diisi!");
            
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Login gagal: " + error.message);
            else checkSession();
        }

        async function handleRegister() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if (!email || !pass) return alert("Email dan Password harus diisi!");
            
            const { error } = await supabaseClient.auth.signUp({ email, password: pass });
            if (error) alert("Registrasi gagal: " + error.message);
            else alert("Akun berhasil dibuat! Silakan login.");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // ==================== FOTO GRID + UPDATE FOTO ====================
        function initPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-gray-100 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden';
                div.innerHTML = `
                    <input type="file" accept="image/*" capture="environment" hidden class="photoInput">
                    <img class="absolute inset-0 w-full h-full object-cover hidden photoPreview">
                    <i class="fas fa-camera text-3xl text-gray-300"></i>
                    <button class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full hidden delete-btn">×</button>
                `;
                
                const input = div.querySelector('.photoInput');
                const preview = div.querySelector('.photoPreview');
                const icon = div.querySelector('i');
                const delBtn = div.querySelector('.delete-btn');

                div.onclick = () => input.click();
                
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (re) => {
                            preview.src = re.target.result;
                            preview.classList.remove('hidden');
                            icon.classList.add('hidden');
                            delBtn.classList.remove('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                };

                delBtn.onclick = (e) => {
                    e.stopImmediatePropagation();
                    preview.src = '';
                    preview.classList.add('hidden');
                    icon.classList.remove('hidden');
                    delBtn.classList.add('hidden');
                    input.value = '';
                };

                grid.appendChild(div);
            }
        }

        function displayExistingPhotos() {
            const grid = document.getElementById('photoGrid');
            const slots = grid.children;

            // Reset semua slot
            for (let slot of slots) {
                const preview = slot.querySelector('.photoPreview');
                const icon = slot.querySelector('i');
                const delBtn = slot.querySelector('.delete-btn');
                const input = slot.querySelector('.photoInput');

                preview.src = '';
                preview.classList.add('hidden');
                icon.classList.remove('hidden');
                delBtn.classList.add('hidden');
                input.value = '';
            }

            // Tampilkan foto lama
            existingPhotoUrls.forEach((url, index) => {
                if (index < 4) {
                    const slot = slots[index];
                    const preview = slot.querySelector('.photoPreview');
                    const icon = slot.querySelector('i');
                    const delBtn = slot.querySelector('.delete-btn');

                    preview.src = url;
                    preview.classList.remove('hidden');
                    icon.classList.add('hidden');
                    delBtn.classList.remove('hidden');

                    delBtn.onclick = (e) => {
                        e.stopImmediatePropagation();
                        existingPhotoUrls.splice(index, 1);
                        displayExistingPhotos();
                    };
                }
            });
        }

        async function prefillFromExisting(id) {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            
            const { data, error } = await supabaseClient.from('demplot_monitoring').select('*').eq('ID_Demplot', id).single();
            if (error || !data) return alert("Gagal memuat data lama");

            // Isi semua field
            document.getElementById('idDemplot').value = data["ID_Demplot"] || '';
            document.getElementById('namaPemilik').value = data["Nama Pemilik Demplot"] || '';
            document.getElementById('telepon').value = data["Telepon"] || '';
            document.getElementById('luasan').value = data["Luasan Demplot"] || '';
            document.getElementById('lokasiGPS').value = data["Lokasi Demplot"] || '';
            document.getElementById('tglTanam').value = data["Tanggal Tanam"] || '';
            document.getElementById('p1').value = data["Tanggal Perlakuan 1"] || '';
            document.getElementById('p2').value = data["Tanggal Perlakuan 2"] || '';
            document.getElementById('p3').value = data["Tanggal Perlakuan 3"] || '';
            document.getElementById('p4').value = data["Tanggal Perlakuan 4"] || '';
            document.getElementById('keterangan').value = data["Keterangan"] || '';

            // Tampilkan foto lama
            existingPhotoUrls = data["Foto"] ? data["Foto"].split(',') : [];
            isUpdateMode = true;
            displayExistingPhotos();

            alert("✅ Data lama berhasil dimuat termasuk fotonya.");
        }

        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if (!id) return alert("ID Demplot belum ada!");

            const inputs = document.querySelectorAll('.photoInput');
            let newUrls = [];

            for (let inp of inputs) {
                if (inp.files[0]) {
                    const b64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onload = e => r(e.target.result.split(',')[1]);
                        fr.readAsDataURL(inp.files[0]);
                    });
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ filename: "IMG_" + id + "_" + Date.now() + ".jpg", image: b64 }) });
                    const j = await res.json();
                    if (j.status === "success") newUrls.push(j.url);
                }
            }

            const finalPhotos = [...existingPhotoUrls, ...newUrls].join(',');

            const payload = {
                "ID_Demplot": id,
                "Nama Pemilik Demplot": document.getElementById('namaPemilik').value,
                "Telepon": document.getElementById('telepon').value,
                "Luasan Demplot": document.getElementById('luasan').value,
                "Lokasi Demplot": document.getElementById('lokasiGPS').value,
                "Foto": finalPhotos,
                "Tanggal Tanam": document.getElementById('tglTanam').value || null,
                "Tanggal Perlakuan 1": document.getElementById('p1').value || null,
                "Tanggal Perlakuan 2": document.getElementById('p2').value || null,
                "Tanggal Perlakuan 3": document.getElementById('p3').value || null,
                "Tanggal Perlakuan 4": document.getElementById('p4').value || null,
                "Keterangan": document.getElementById('keterangan').value,
                "last_edited": activeUser.email
            };

            const { error } = await supabaseClient.from('demplot_monitoring').upsert(payload);
            if (error) {
                alert("Gagal menyimpan: " + error.message);
            } else {
                alert("✅ Data berhasil disimpan!");
                location.reload();
            }
        }

        // ==================== FUNGSI LAIN (SAMA SEPERTI SEBELUMNYA) ====================
        // detectGPS, autoFillWilayah, generateIDManual, checkExistingNearby, dll
        // (Fungsi-fungsi ini tetap sama dengan versi sebelumnya yang sudah berfungsi)

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // ... (fungsi lainnya seperti detectGPS, autoFillWilayah, dll tetap ada di script asli kamu)
    </script>
</body>
</html>
