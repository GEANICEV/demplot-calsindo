    <script>
        // ... (semua fungsi IndexedDB, Foto, Sync, GPS, dll tetap sama seperti script terakhir)

        // ==================== AUTH FUNCTIONS ====================
        async function handleLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if (!email || !pass) return alert("Email dan Password harus diisi!");

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
                if (error) {
                    alert("Login gagal: " + error.message);
                } else {
                    await checkSession();
                }
            } catch (e) {
                alert("Terjadi kesalahan saat login");
                console.error(e);
            }
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            
            if (!name || !email || !pass) return alert("Nama, Email, dan Password harus diisi!");

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password: pass,
                    options: { data: { full_name: name } }
                });

                if (error) return alert("Registrasi gagal: " + error.message);

                alert("Akun berhasil dibuat! Silakan login.");
                showLoginForm();
            } catch (e) {
                alert("Terjadi kesalahan saat registrasi.");
                console.error(e);
            }
        }

        function showLoginForm() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegisterForm() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        // ==================== INIT (Event Listeners) ====================
        window.onload = async () => {
            await initDB();
            initPhotoGrid();
            checkSession();
            await loadProvinces();

            // Event Listeners untuk tombol & link
            document.getElementById('btnLogin').addEventListener('click', handleLogin);
            document.getElementById('btnRegister').addEventListener('click', handleRegister);
            document.getElementById('linkToRegister').addEventListener('click', showRegisterForm);
            document.getElementById('linkToLogin').addEventListener('click', showLoginForm);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js');
            }
        };
    </script>

    <!-- MODAL & LAINNYA (sama seperti sebelumnya) -->

    <script>
        // ... (Script IndexedDB, Foto, Sync, detectGPS, autoFillWilayah, dll tetap sama seperti versi sebelumnya)

        // ==================== AUTO SYNC SAAT APP DIBUKA ====================
        async function checkAndAutoSync() {
            const pending = await getAllPending();
            if (pending.length > 0 && navigator.onLine) {
                document.getElementById('loadingText').textContent = `Sync ${pending.length} data pending...`;
                document.getElementById('loadingOverlay').classList.remove('hidden');
                await processPendingQueue();
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        // ==================== PULL TO REFRESH ====================
        function enablePullToRefresh() {
            let startY = 0;
            const main = document.getElementById('mainContent');
            
            main.addEventListener('touchstart', e => startY = e.touches[0].clientY);
            main.addEventListener('touchend', e => {
                const endY = e.changedTouches[0].clientY;
                if (endY - startY > 120 && window.scrollY === 0) {
                    location.reload();
                }
            });
        }

        // ==================== LAST SYNCED ====================
        function updateLastSynced() {
            const last = localStorage.getItem('lastSynced');
            const el = document.getElementById('lastSynced');
            if (last) {
                const time = new Date(parseInt(last));
                el.textContent = `Terakhir sync: ${time.toLocaleTimeString('id-ID')}`;
            } else {
                el.textContent = "Belum pernah sync";
            }
        }

        // ==================== LOGOUT CONFIRMATION ====================
        async function handleLogout() {
            if (confirm("Yakin ingin keluar?")) {
                await supabaseClient.auth.signOut();
                location.reload();
            }
        }

        // ==================== INIT ====================
        window.onload = async () => {
            await initDB();
            initPhotoGrid();
            checkSession();
            await loadProvinces();
            
            enablePullToRefresh();
            updateLastSynced();
            
            // Auto sync saat app dibuka
            setTimeout(checkAndAutoSync, 800);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js');
            }
            
            window.addEventListener('online', checkAndAutoSync);
        };
    </script>
