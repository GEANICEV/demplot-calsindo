    <script>
        const SB_URL = "https://adlsyyualatelwwkftyf.supabase.co";
        const SB_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbHN5eXVhbGF0ZWx3d2tmdHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDY3MzcsImV4cCI6MjA4NjU4MjczN30.QG7BL1d5OORWX6U6TGvz5-1IgjjsT8xexGUwwKM8AH4";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyIfannGC5N-oykQAiRXfL4d62txBsxM1upcao6qkuuBFV9l9AyoRnBYsnAcwCj8TFfmA/exec";

        async function handleLogin() {

        // ==================== FUNGSI BARU: CEK LOKASI TERDEKAT ====================
        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        function parseCoordinatesFromUrl(url) {
            if (!url) return null;
            const match = url.match(/q=([-\d.]+),([-\d.]+)/);
            if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            return null;
        }
        
        async function checkExistingNearby(currentLat, currentLng) {
            showLoading(true, "Mengecek lokasi terdekat di database...");
            
            const { data, error } = await supabaseClient
                .from('demplot_monitoring')
                .select('ID_Demplot, "Nama Pemilik Demplot", "Lokasi Demplot"');
            
            if (error || !data) {
                showLoading(false);
                return false;
            }
            
            const nearby = [];
            
            for (let record of data) {
                const coords = parseCoordinatesFromUrl(record["Lokasi Demplot"]);
                if (!coords) continue;
                
                const dist = getDistanceFromLatLonInMeters(currentLat, currentLng, coords.lat, coords.lng);
                
                if (dist <= 50) {
                    nearby.push({
                        id: record.ID_Demplot,
                        nama: record["Nama Pemilik Demplot"] || "Tanpa Nama",
                        distance: Math.round(dist),
                        lokasi: record["Lokasi Demplot"]
                    });
                }
            }
            
            showLoading(false);
            
            if (nearby.length > 0) {
                currentNearbyRecords = nearby;
                showNearbyModal();
                return true;
            }
            
            return false;
        }
        
        function showNearbyModal() {
            const modal = document.getElementById('locationChoiceModal');
            const listContainer = document.getElementById('nearbyList');
            listContainer.innerHTML = '';
            
            currentNearbyRecords.forEach(record => {
                const div = document.createElement('div');
                div.className = 'bg-gray-50 border border-gray-200 rounded-2xl p-4 flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <div class="font-mono font-bold text-sm">${record.id}</div>
                        <div class="text-sm text-gray-700">${record.nama}</div>
                        <div class="text-[10px] text-emerald-600">≈ ${record.distance} meter dari sini</div>
                    </div>
                    <button onclick="prefillFromExisting('${record.id}')" 
                            class="bg-emerald-600 text-white text-xs px-4 py-2 rounded-xl font-bold active:bg-emerald-700">
                        Update
                    </button>
                `;
                listContainer.appendChild(div);
            });
            
            modal.classList.remove('hidden');
        }
        
        async function prefillFromExisting(id) {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            showLoading(true, "Memuat data lama...");
            
            const { data, error } = await supabaseClient
                .from('demplot_monitoring')
                .select('*')
                .eq('ID_Demplot', id)
                .single();
            
            showLoading(false);
            
            if (error || !data) {
                alert("Gagal memuat data lama");
                return;
            }
            
            // Isi semua field
            document.getElementById('idDemplot').value = data["ID_Demplot"] || '';
            document.getElementById('namaPemilik').value = data["Nama Pemilik Demplot"] || '';
            document.getElementById('telepon').value = data["Telepon"] || '';
            document.getElementById('luasan').value = data["Luasan Demplot"] || '';
            document.getElementById('lokasiGPS').value = data["Lokasi Demplot"] || '';
            document.getElementById('tglTanam').value = data["Tanggal Tanam"] || '';
            document.getElementById('p1').value = data["Tanggal Perlakuan 1"] || '';
            document.getElementById('p2').value = data["Tanggal Perlakuan 2"] || '';
            document.getElementById('p3').value = data["Tanggal Perlakuan 3"] || '';
            document.getElementById('p4').value = data["Tanggal Perlakuan 4"] || '';
            document.getElementById('keterangan').value = data["Keterangan"] || '';
            
            // Tampilkan pesan mode update
            const status = document.getElementById('locationStatus');
            status.innerHTML = `<i class="fas fa-edit mr-1"></i> <span>Mode Update - Data akan diperbarui</span>`;
            status.classList.remove('hidden');
            status.classList.add('text-orange-600');
            
            alert("✅ Data lama berhasil dimuat. Silakan edit jika perlu, lalu tekan SIMPAN.");
        }
        
        function chooseCreateNew() {
            document.getElementById('locationChoiceModal').classList.add('hidden');
            
            // Lanjutkan proses normal (auto fill wilayah)
            const gpsValue = document.getElementById('lokasiGPS').value;
            const match = gpsValue.match(/q=([-\d.]+),([-\d.]+)/);
            if (match) {
                const lat = parseFloat(match[1]);
                const lng = parseFloat(match[2]);
                autoFillWilayah(lat, lng);
            }
        }
        
        // ==================== FUNGSI DETEKSI GPS (DENGAN CEK LOKASI LAMA) ====================
        function detectGPS() {
            showLoading(true, "Mengunci Satelit GPS...");
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                document.getElementById('lokasiGPS').value = `https://maps.google.com/?q=${lat},${lng}`;
                
                // Cek apakah ada lokasi lama dalam 50 meter
                const hasNearby = await checkExistingNearby(lat, lng);
                
                if (!hasNearby) {
                    await autoFillWilayah(lat, lng);
                }
                
                showLoading(false);
            }, (e) => {
                showLoading(false);
                alert("GPS Error: " + e.message);
            }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
        }
        
        // ==================== FUNGSI LAIN (SAMA SEPERTI SEBELUMNYA) ====================
        async function autoFillWilayah(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (!data || !data.address) return;
                
                const addr = data.address;
                const satProv = normalize(addr.state || addr.region || "");
                const provOpts = document.getElementById('selProvinsi').options;
                
                for (let i = 1; i < provOpts.length; i++) {
                    const pNameNorm = normalize(provOpts[i].text);
                    if (satProv === pNameNorm || satProv.includes(pNameNorm) || pNameNorm.includes(satProv)) {
                        document.getElementById('selProvinsi').value = provOpts[i].value;
                        await loadCities(provOpts[i].value);
                        break;
                    }
                }
                
                const satKota = normalize(addr.city || addr.county || addr.town || addr.municipality || "");
                const kotaOpts = document.getElementById('selKota').options;
                
                for (let i = 1; i < kotaOpts.length; i++) {
                    const kNameNorm = normalize(kotaOpts[i].text);
                    if (satKota === kNameNorm || satKota.includes(kNameNorm) || kNameNorm.includes(satKota)) {
                        document.getElementById('selKota').value = kotaOpts[i].value;
                        await loadDistricts(kotaOpts[i].value);
                        break;
                    }
                }
                
                const potentialKec = [addr.suburb, addr.district, addr.village, addr.municipality, addr.town, addr.city_district].filter(Boolean).map(n => normalize(n)).filter(n => n.length > 2);
                const kecOpts = document.getElementById('selKecamatan').options;
                let foundKec = false;
                
                for (let target of potentialKec) {
                    for (let i = 1; i < kecOpts.length; i++) {
                        const optNorm = normalize(kecOpts[i].text);
                        const isMatch = optNorm === target || optNorm.includes(target) || target.includes(optNorm) ||
                            (target.split(' ').some(w => w.length > 3 && optNorm.includes(w)) && optNorm.split(' ').some(w => w.length > 3 && target.includes(w)));
                        if (isMatch) {
                            document.getElementById('selKecamatan').value = kecOpts[i].value;
                            foundKec = true;
                            break;
                        }
                    }
                    if (foundKec) break;
                }
                
                const statusEl = document.getElementById('locationStatus');
                const statusText = document.getElementById('statusText');
                
                if (foundKec) {
                    await generateIDManual();
                    document.getElementById('selProvinsi').disabled = true;
                    document.getElementById('selKota').disabled = true;
                    document.getElementById('selKecamatan').disabled = true;
                    statusText.innerHTML = "Lokasi &amp; ID otomatis dari GPS";
                    statusEl.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function generateIDManual() {
            const pOpt = document.querySelector('#selProvinsi option:checked');
            const kOpt = document.querySelector('#selKota option:checked');
            const dOpt = document.querySelector('#selKecamatan option:checked');
            if (!pOpt || !kOpt || !dOpt) return;
            
            const cleanP = getShortProv(pOpt.dataset.name);
            const cleanK = toPascalCaseID(kOpt.dataset.name);
            const cleanD = toPascalCaseID(dOpt.dataset.name);
            const prefix = cleanP + "_" + cleanK + "_" + cleanD;
            
            showLoading(true, "Mengecek ID Tersedia...");
            const { data } = await supabaseClient.from('demplot_monitoring').select('ID_Demplot').ilike('ID_Demplot', prefix + '%');
            
            const existing = new Set();
            if (data) data.forEach(row => {
                const num = parseInt(row.ID_Demplot.split('_').pop());
                if (!isNaN(num)) existing.add(num);
            });
            
            let next = 1;
            while (existing.has(next)) next++;
            if (next > 999) next = 999;
            
            document.getElementById('idDemplot').value = prefix + "_" + next.toString().padStart(3, '0');
            showLoading(false);
        }
        
        function getShortProv(fullName) {
            const n = fullName.toUpperCase();
            if (n.includes("JAWA TIMUR")) return "Jatim";
            if (n.includes("JAWA TENGAH")) return "Jateng";
            if (n.includes("JAWA BARAT")) return "Jabar";
            if (n.includes("NUSA TENGGARA BARAT")) return "NTB";
            if (n.includes("NUSA TENGGARA TIMUR")) return "NTT";
            if (n.includes("YOGYAKARTA")) return "DIY";
            if (n.includes("JAKARTA")) return "DKI";
            return toPascalCaseID(fullName);
        }

            const grid = document.getElementById('photoGrid');
            const temp = document.getElementById('photoTemplate');
            for (let i = 0; i < 4; i++) {
                const clone = temp.content.cloneNode(true);
                const container = clone.querySelector('div');
                const input = clone.querySelector('.photoInput');
                const preview = clone.querySelector('.photoPreview');
                const icon = clone.querySelector('i');
                container.onclick = () => input.click();
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (re) => {
                            preview.src = re.target.result;
                            preview.classList.remove('hidden');
                            icon.classList.add('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                grid.appendChild(clone);
            }
        }
        
        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if (!id) return alert("ID Demplot belum terbuat!");
            
            const basePayload = {
                "ID_Demplot": id,
                "Nama Pemilik Demplot": document.getElementById('namaPemilik').value,
                "Telepon": document.getElementById('telepon').value,
                "Luasan Demplot": document.getElementById('luasan').value,
                "Lokasi Demplot": document.getElementById('lokasiGPS').value,
                "Foto": "",
                "Tanggal Tanam": fixDate(document.getElementById('tglTanam').value),
                "Tanggal Perlakuan 1": fixDate(document.getElementById('p1').value),
                "Tanggal Perlakuan 2": fixDate(document.getElementById('p2').value),
                "Tanggal Perlakuan 3": fixDate(document.getElementById('p3').value),
                "Tanggal Perlakuan 4": fixDate(document.getElementById('p4').value),
                "Keterangan": document.getElementById('keterangan').value,
                "last_edited": activeUser.email,
                "created_by": activeUser.email
            };
            
            showLoading(true, "Menyimpan data ke Supabase...");
            const { error: supabaseError } = await supabaseClient.from('demplot_monitoring').upsert(basePayload);
            
            if (supabaseError) {
                showLoading(false);
                return alert("Gagal menyimpan: " + supabaseError.message);
            }
            
            showLoading(true, "Mengunggah Foto...");
            const inputs = document.querySelectorAll('.photoInput');
            let urls = [];
            
            for (let inp of inputs) {
                if (inp.files[0]) {
                    const b64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onload = (e) => r(e.target.result.split(',')[1]);
                        fr.readAsDataURL(inp.files[0]);
                    });
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ filename: "IMG_" + id + "_" + Date.now() + ".jpg", image: b64 }) });
                    const j = await res.json();
                    if (j.status === "success") urls.push(j.url);
                }
            }
            
            if (urls.length > 0) {
                showLoading(true, "Menyimpan link foto...");
                await supabaseClient.from('demplot_monitoring').update({ "Foto": urls.join(',') }).eq('ID_Demplot', id);
            }
            
            showLoading(false);
            alert("✅ Data berhasil disimpan!");
            location.reload();
        }
        
        function showLoading(show, text) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.toggle('hidden', !show);
            document.getElementById('loadingText').innerText = text || "Processing...";
        }
        
        function fixDate(d) { return d === "" ? null : d; }
        
        function normalize(str) {
            if (!str) return '';
            return str.toLowerCase()
                .replace(/\b(kabupaten|kota|kecamatan|kec\.|regency|city|district|suburb|village|municipality|town|kelurahan|desa|provinsi)\b/gi, '')
                .replace(/[^a-z0-9\s]/g, '')
                .trim()
                .replace(/\s+/g, ' ');
        }
        
        function toTitleCaseDisplay(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "").toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }
        
        function toPascalCaseID(str) {
            return str.replace(/KABUPATEN |KOTA |KECAMATAN |KEC\. /gi, "").toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
        }
        
        async function loadProvinces() {
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json");
            const data = await res.json();
            let html = '<option value="">Pilih Prov</option>';
            data.forEach(p => html += `<option value="${p.id}" data-name="${p.name}">${toTitleCaseDisplay(p.name)}</option>`);
            document.getElementById('selProvinsi').innerHTML = html;
        }
        
        async function loadCities(pid) {
            if (!pid) return;
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${pid}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kota</option>';
            data.forEach(c => html += `<option value="${c.id}" data-name="${c.name}">${toTitleCaseDisplay(c.name)}</option>`);
            document.getElementById('selKota').innerHTML = html;
        }
        
        async function loadDistricts(cid) {
            if (!cid) return;
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${cid}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kecamatan</option>';
            data.forEach(d => html += `<option value="${d.id}" data-name="${d.name}">${toTitleCaseDisplay(d.name)}</option>`);
            document.getElementById('selKecamatan').innerHTML = html;
        }
    </script>
</body>
