<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Calsindo - PWA Version</title>
   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calsindo">
    <link rel="apple-touch-icon" href="calsindo.jpeg">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden-view { display: none !important; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input:read-only { background-color: #f9fafb; color: #4b5563; }
        select:disabled { background-color: #f3f4f6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- (Semua HTML sama persis seperti script sebelumnya) -->
    <!-- Saya hanya menampilkan bagian yang berubah untuk efisiensi -->

    <!-- ... (header, form, modal, dll tetap sama) ... -->

    <script>
        // ==================== FUNGSI AUTO FILL WILAYAH (SUDAH DIPERBAIKI) ====================
        async function autoFillWilayah(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (!data || !data.address) {
                    alert("Data lokasi dari satelit kurang lengkap. Silakan pilih manual.");
                    return;
                }
                
                const addr = data.address;
                const satProv = normalize(addr.state || addr.region || "");
                
                const provOpts = document.getElementById('selProvinsi').options;
                let provinceMatched = false;
                
                // === PERBAIKAN: Pencocokan Provinsi Lebih Ketat ===
                for (let i = 1; i < provOpts.length; i++) {
                    const pNameNorm = normalize(provOpts[i].text);
                    
                    const isExact = satProv === pNameNorm;
                    const isStrongMatch = 
                        (satProv.includes(pNameNorm) && pNameNorm.length >= 5) || 
                        (pNameNorm.includes(satProv) && satProv.length >= 5);
                    
                    if (isExact || isStrongMatch) {
                        document.getElementById('selProvinsi').value = provOpts[i].value;
                        await loadCities(provOpts[i].value);
                        provinceMatched = true;
                        break;
                    }
                }
                
                // Jika provinsi gagal cocok → beri peringatan
                if (!provinceMatched) {
                    alert("Gagal mendeteksi Provinsi otomatis dengan akurat.\nSilakan pilih Provinsi secara manual.");
                    return;
                }
                
                // Lanjut ke Kota & Kecamatan (sama seperti sebelumnya)
                const satKota = normalize(addr.city || addr.county || addr.town || addr.municipality || "");
                const kotaOpts = document.getElementById('selKota').options;
                let kotaSet = false;
                
                for (let i = 1; i < kotaOpts.length; i++) {
                    const kNameNorm = normalize(kotaOpts[i].text);
                    if (satKota === kNameNorm || satKota.includes(kNameNorm) || kNameNorm.includes(satKota)) {
                        document.getElementById('selKota').value = kotaOpts[i].value;
                        await loadDistricts(kotaOpts[i].value);
                        kotaSet = true;
                        break;
                    }
                }
                
                // Kecamatan (logika sama)
                const potentialKec = [
                    addr.suburb, addr.district, addr.village, addr.municipality,
                    addr.town, addr.city_district, addr.neighbourhood, addr.hamlet
                ].filter(Boolean).map(n => normalize(n)).filter(n => n.length > 2);
                
                const kecOpts = document.getElementById('selKecamatan').options;
                let foundKec = false;
                
                for (let target of potentialKec) {
                    for (let i = 1; i < kecOpts.length; i++) {
                        const optNorm = normalize(kecOpts[i].text);
                        const isMatch = 
                            optNorm === target ||
                            optNorm.includes(target) ||
                            target.includes(optNorm) ||
                            (target.split(' ').some(w => w.length > 3 && optNorm.includes(w)) &&
                             optNorm.split(' ').some(w => w.length > 3 && target.includes(w)));
                        
                        if (isMatch) {
                            document.getElementById('selKecamatan').value = kecOpts[i].value;
                            foundKec = true;
                            break;
                        }
                    }
                    if (foundKec) break;
                }
                
                // Kunci & Generate ID
                const statusEl = document.getElementById('locationStatus');
                const statusText = document.getElementById('statusText');
                
                if (foundKec) {
                    await generateIDManual();
                    document.getElementById('selProvinsi').disabled = true;
                    document.getElementById('selKota').disabled = true;
                    document.getElementById('selKecamatan').disabled = true;
                    statusText.innerHTML = "Lokasi &amp; ID otomatis dari GPS";
                    statusEl.classList.remove('hidden');
                } else if (kotaSet) {
                    document.getElementById('selProvinsi').disabled = true;
                    document.getElementById('selKota').disabled = true;
                    statusText.innerHTML = "Prov &amp; Kota otomatis. Pilih Kecamatan";
                    statusEl.classList.remove('hidden');
                }
                
            } catch (e) {
                console.error("Geocoding Error:", e);
                alert("Terjadi kesalahan saat membaca lokasi. Silakan isi manual.");
            }
        }
        
        // ==================== FUNGSI LAIN (SAMA SEPERTI SCRIPT SEBELUMNYA) ====================
        // (Saya tidak mengulang seluruh script agar tidak terlalu panjang)
        // Kamu bisa pakai script lengkap dari respons sebelumnya, lalu hanya ganti fungsi autoFillWilayah di atas.
        
        // ... (semua fungsi lainnya tetap sama: detectGPS, generateIDManual, submitData, modal, dll)
    </script>
</body>
</html>
