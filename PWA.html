<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Calsindo - Staff Input</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DemplotApp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input:read-only { background-color: #f3f4f6; color: #6b7280; }
    </style>
</head>
<body class="bg-gray-50 pb-10">

    <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="font-bold text-lg text-gray-800">Monitoring Calsindo</h1>
            <p id="userNameDisplay" class="text-xs text-blue-600 font-medium italic">Memuat Petugas...</p>
        </div>
        <img src="https://emdeki.co.id/wp-content/uploads/2021/04/Logo-Emdeki-Utama.png" class="h-8 object-contain" alt="Logo">
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">

        <button onclick="detectGPS()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95">
            <i class="fas fa-location-crosshairs text-xl"></i>
            DETEKSI LOKASI & ID OTOMATIS
        </button>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Provinsi</label>
                    <select id="selProvinsi" onchange="loadCities(this.value)" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none h-10">
                        <option value="">Pilih Prov</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Kota/Kab</label>
                    <select id="selKota" onchange="loadDistricts(this.value)" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none h-10">
                        <option value="">Pilih Kota</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Kecamatan</label>
                <select id="selKecamatan" onchange="generateIDManual()" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none h-10">
                    <option value="">Pilih Kecamatan</option>
                </select>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">ID Demplot (Auto)</label>
                <input type="text" id="idDemplot" readonly class="w-full border rounded-lg p-3 text-sm font-mono font-bold">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Nama Pemilik</label>
                <input type="text" id="namaPemilik" placeholder="Nama petani..." class="w-full border rounded-lg p-3 text-sm">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Telepon</label>
                    <input type="tel" id="telepon" placeholder="08..." class="w-full border rounded-lg p-3 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Luasan (Ha)</label>
                    <input type="number" step="0.01" id="luasan" placeholder="0.25" class="w-full border rounded-lg p-3 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Lokasi GPS</label>
                <input type="text" id="lokasiGPS" readonly class="w-full border rounded-lg p-3 text-xs text-blue-600 underline">
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <label class="block text-xs font-semibold text-gray-500 mb-3">Foto Dokumentasi (Klik Kotak)</label>
            <div class="grid grid-cols-4 gap-2">
                <div onclick="document.getElementById('f1').click()" class="aspect-square bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden">
                    <input type="file" id="f1" accept="image/*" capture="environment" hidden onchange="previewImg(this, 'p1')">
                    <img id="p1" class="absolute inset-0 w-full h-full object-cover hidden">
                    <i class="fas fa-camera text-gray-400"></i>
                </div>
                <div onclick="document.getElementById('f2').click()" class="aspect-square bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden">
                    <input type="file" id="f2" accept="image/*" capture="environment" hidden onchange="previewImg(this, 'p2')">
                    <img id="p2" class="absolute inset-0 w-full h-full object-cover hidden">
                    <i class="fas fa-camera text-gray-400"></i>
                </div>
                <div onclick="document.getElementById('f3').click()" class="aspect-square bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden">
                    <input type="file" id="f3" accept="image/*" capture="environment" hidden onchange="previewImg(this, 'p3')">
                    <img id="p3" class="absolute inset-0 w-full h-full object-cover hidden">
                    <i class="fas fa-camera text-gray-400"></i>
                </div>
                <div onclick="document.getElementById('f4').click()" class="aspect-square bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer relative overflow-hidden">
                    <input type="file" id="f4" accept="image/*" capture="environment" hidden onchange="previewImg(this, 'p4')">
                    <img id="p4" class="absolute inset-0 w-full h-full object-cover hidden">
                    <i class="fas fa-camera text-gray-400"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 grid grid-cols-2 gap-3">
            <div class="col-span-2">
                <label class="block text-xs font-semibold text-gray-500 mb-1">Tanggal Tanam</label>
                <input type="date" id="tglTanam" class="w-full border rounded-lg p-3 text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">P1</label>
                <input type="date" id="p1_date" class="w-full border rounded-lg p-2 text-sm h-10">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">P2</label>
                <input type="date" id="p2_date" class="w-full border rounded-lg p-2 text-sm h-10">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">P3</label>
                <input type="date" id="p3_date" class="w-full border rounded-lg p-2 text-sm h-10">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">P4</label>
                <input type="date" id="p4_date" class="w-full border rounded-lg p-2 text-sm h-10">
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <label class="block text-xs font-semibold text-gray-500 mb-1">Keterangan</label>
            <textarea id="keterangan" rows="3" class="w-full border rounded-lg p-3 text-sm" placeholder="Catatan lapangan..."></textarea>
        </div>

        <button onclick="submitData()" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl active:bg-blue-700 transition-all flex items-center justify-center gap-2">
            <i class="fas fa-cloud-upload-alt"></i>
            SIMPAN DATA
        </button>

    </main>

    <div id="loadingOverlay" class="fixed inset-0 bg-black/60 z-[100] hidden flex flex-col items-center justify-center text-white">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p id="loadingText" class="text-sm font-semibold">Memproses Data...</p>
    </div>

    <script>
        // CONFIG KONFIGURASI (Sesuai parameter Anda)
        const SUPABASE_URL = "https://adlsyyualatelwwkftyf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkbHN5eXVhbGF0ZWx3d2tmdHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDY3MzcsImV4cCI6MjA4NjU4MjczN30.QG7BL1d5OORWX6U6TGvz5-1IgjjsT8xexGUwwKM8AH4";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfE94m7LzQZl_0Lp9v_2Yp_7Q5X_NlZf/exec"; // Gunakan URL GAS Anda yang sudah ada

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = "Petugas iPhone";

        // Inisialisasi
        window.onload = async () => {
            await loadProvinces();
            // Cek session login jika ada, jika tidak default
            document.getElementById('userNameDisplay').innerText = `User: ${currentUser}`;
        };

        // --- 1. DROPDOWN WILAYAH (EMSIFA) ---
        async function loadProvinces() {
            const res = await fetch("https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json");
            const data = await res.json();
            let html = '<option value="">Pilih Prov</option>';
            data.forEach(p => html += `<option value="${p.id}" data-name="${p.name}">${formatTitleCase(p.name)}</option>`);
            document.getElementById('selProvinsi').innerHTML = html;
        }

        async function loadCities(provId) {
            if(!provId) return;
            showLoading(true, "Memuat Kota...");
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${provId}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kota</option>';
            data.forEach(c => html += `<option value="${c.id}" data-name="${c.name}">${formatTitleCase(c.name)}</option>`);
            document.getElementById('selKota').innerHTML = html;
            document.getElementById('selKecamatan').innerHTML = '<option value="">Pilih Kecamatan</option>';
            showLoading(false);
        }

        async function loadDistricts(cityId) {
            if(!cityId) return;
            showLoading(true, "Memuat Kecamatan...");
            const res = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${cityId}.json`);
            const data = await res.json();
            let html = '<option value="">Pilih Kecamatan</option>';
            data.forEach(d => html += `<option value="${d.id}" data-name="${d.name}">${formatTitleCase(d.name)}</option>`);
            document.getElementById('selKecamatan').innerHTML = html;
            showLoading(false);
        }

        // --- 2. GPS & GEOLOCATION ---
        function detectGPS() {
            if (!navigator.geolocation) return alert("GPS tidak didukung di iPhone ini");
            
            showLoading(true, "Mengunci Satelit GPS...");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('lokasiGPS').value = `https://www.google.com/maps?q=${lat},${lng}`;
                
                // Cari apakah lahan sudah ada (Radius 50m)
                checkExistingLahan(lat, lng);
                
                // Reverse Geocode via BigDataCloud (Gratis & Cepat)
                try {
                    const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=id`);
                    const gData = await res.json();
                    
                    // Auto-select Dropdown (Simplified logic)
                    // Anda mungkin perlu mapping manual nama wilayah jika API berbeda
                    console.log("GPS Wilayah:", gData.locality);
                } catch(e) {}
                
                showLoading(false);
            }, () => {
                showLoading(false);
                alert("Gagal ambil lokasi. Pastikan GPS aktif.");
            }, { enableHighAccuracy: true });
        }

        // --- 3. MAPPING & ID GENERATOR ---
        function getShortProv(fullName) {
            const name = fullName.toUpperCase();
            if (name.includes("JAWA TIMUR")) return "Jatim";
            if (name.includes("JAWA TENGAH")) return "Jateng";
            if (name.includes("JAWA BARAT")) return "Jabar";
            if (name.includes("NUSA TENGGARA BARAT")) return "NTB";
            if (name.includes("NUSA TENGGARA TIMUR")) return "NTT";
            if (name.includes("YOGYAKARTA")) return "DIY";
            if (name.includes("JAKARTA")) return "DKI";
            return name.replace(/\s/g, "");
        }

        async function generateIDManual() {
            const prov = document.querySelector('#selProvinsi option:checked').dataset.name;
            const kota = document.querySelector('#selKota option:checked').dataset.name;
            const kec = document.querySelector('#selKecamatan option:checked').dataset.name;

            const cleanProv = getShortProv(prov);
            const cleanKota = kota.replace(/KABUPATEN|KOTA|KECAMATAN|\s/gi, "");
            const cleanKec = kec.replace(/KABUPATEN|KOTA|KECAMATAN|\s/gi, "");
            
            const prefix = `${cleanProv}_${cleanKota}_${cleanKec}`;
            
            // Cari index urut di Supabase
            showLoading(true, "Mencari Slot ID...");
            const { data } = await supabase.from('demplot_monitoring').select('ID_Demplot').ilike('ID_Demplot', `${prefix}%`);
            
            let nextNum = 1;
            if(data && data.length > 0) {
                const nums = data.map(i => parseInt(i.ID_Demplot.split('_').pop())).filter(n => !isNaN(n));
                if(nums.length > 0) nextNum = Math.max(...nums) + 1;
            }
            
            document.getElementById('idDemplot').value = `${prefix}_${nextNum.toString().padStart(3, '0')}`;
            showLoading(false);
        }

        // --- 4. UPLOAD & SUBMIT ---
        async function submitData() {
            const id = document.getElementById('idDemplot').value;
            if(!id) return alert("Deteksi Lokasi/ID dulu!");

            showLoading(true, "Mengunggah Foto ke Drive...");
            
            // Upload Foto yang ada saja
            const fileInputs = ['f1', 'f2', 'f3', 'f4'];
            let uploadedUrls = [];

            for(let fid of fileInputs) {
                const file = document.getElementById(fid).files[0];
                if(file) {
                    const base64 = await toBase64(file);
                    const driveUrl = await uploadToDrive(base64, `IMG_${id}_${Date.now()}.jpg`);
                    if(driveUrl) uploadedUrls.push(driveUrl);
                }
            }

            showLoading(true, "Menyimpan ke Supabase...");
            const payload = {
                "ID_Demplot": id,
                "Nama Pemilik Demplot": document.getElementById('namaPemilik').value,
                "Telepon": document.getElementById('telepon').value,
                "Luasan Demplot": document.getElementById('luasan').value,
                "Lokasi Demplot": document.getElementById('lokasiGPS').value,
                "Foto": uploadedUrls.join(','),
                "Tanggal Tanam": fixDate(document.getElementById('tglTanam').value),
                "Tanggal Perlakuan 1": fixDate(document.getElementById('p1_date').value),
                "Tanggal Perlakuan 2": fixDate(document.getElementById('p2_date').value),
                "Tanggal Perlakuan 3": fixDate(document.getElementById('p3_date').value),
                "Tanggal Perlakuan 4": fixDate(document.getElementById('p4_date').value),
                "Keterangan": document.getElementById('keterangan').value,
                "last_edited": currentUser,
                "created_by": currentUser
            };

            const { error } = await supabase.from('demplot_monitoring').upsert(payload);

            showLoading(false);
            if(error) {
                alert("Gagal: " + error.message);
            } else {
                alert("Berhasil Tersimpan!");
                location.reload();
            }
        }

        // Helper: Upload ke Google Drive via GAS
        async function uploadToDrive(base64, fileName) {
            try {
                const cleanBase64 = base64.split(',')[1];
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ filename: fileName, image: cleanBase64 })
                });
                const json = await res.json();
                return json.status === "success" ? json.url : null;
            } catch(e) { return null; }
        }

        // --- UI HELPERS ---
        function previewImg(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById(targetId);
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function showLoading(show, text = "") {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
            if(text) document.getElementById('loadingText').innerText = text;
        }

        function formatTitleCase(str) {
            return str.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
        }

        function fixDate(d) { return d === "" ? null : d; }

        async function checkExistingLahan(lat, lng) {
            // Logika radius 50m bisa dilakukan dengan menarik semua data 
            // atau menggunakan fungsi PostGIS di Supabase jika diaktifkan.
            // Di sini kita biarkan user membuat baru/input manual.
        }

    </script>
</body>
</html>
